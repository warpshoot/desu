<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PXL ULTRA | DESU™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e0e0e0;
      --accent: #ff3366;
      --border: #333;
      --panel-bg: #151515;
      --disabled: #555;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--bg);
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 2px;
    }

    header .brand {
      color: var(--disabled);
      font-size: 0.9rem;
    }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
      overflow-y: auto;
      align-items: center;
      position: relative;
    }

    .canvas-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .canvas-label {
      font-size: 0.8rem;
      color: var(--disabled);
      text-transform: uppercase;
    }

    canvas {
      width: 100%;
      height: auto;
      background-color: #000;
      border: 1px solid var(--border);
      image-rendering: pixelated;
    }

    #dropZone {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.8);
      border: 2px dashed var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: all 0.2s;
    }

    #dropZone.hidden { display: none; }
    #dropZone.hover {
      border-color: var(--accent);
      background: rgba(255,51,102,0.1);
    }

    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 50;
    }

    .panel-area {
      width: 340px;
      background-color: var(--panel-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .panel-section {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section h2 {
      margin: 0 0 15px 0;
      font-size: 0.9rem;
      color: var(--accent);
      text-transform: uppercase;
    }

    .control-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 0.8rem;
      color: #aaa;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    select, button, input[type="file"], input[type="color"] {
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
    }

    button:hover, select:hover {
      border-color: var(--fg);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: bold;
    }
    
    button.primary:hover {
      background: #e62e5c;
      border-color: #e62e5c;
    }

    .export-row {
      display: flex;
      gap: 5px;
    }
    .export-row button {
      flex: 1;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333;
      transition: .2s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: #aaa;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before {
      transform: translateX(16px);
      background-color: #fff;
    }

    @media (max-width: 768px) {
      main { flex-direction: column; }
      .panel-area { width: 100%; border-left: none; border-top: 1px solid var(--border); flex: 1; }
      .preview-area { flex: none; height: 40vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>PXL ULTRA</h1>
    <span class="brand">DESU™</span>
  </header>

  <main>
    <div class="preview-area" id="previewArea">
      <div id="dropZone">
        <div>Drop Image Here or Click to Upload</div>
      </div>
      <div id="loading">PROCESSING...</div>
      
      <div class="canvas-container">
        <div class="canvas-label">Original</div>
        <canvas id="origCanvas"></canvas>
      </div>
      <div class="canvas-container">
        <div class="canvas-label">Processed</div>
        <canvas id="outCanvas"></canvas>
      </div>
    </div>

    <div class="panel-area">
      <!-- 1. Resolution -->
      <div class="panel-section">
        <h2>1. Resolution</h2>
        <div class="control-row">
          <label>Preset</label>
          <select id="resPreset">
            <option value="32">ICON (32px)</option>
            <option value="64">SPRITE (64px)</option>
            <option value="128" selected>SCREEN (128px)</option>
            <option value="256">POSTER (256px)</option>
            <option value="512">CANVAS (512px)</option>
            <option value="gb">GB (160x144)</option>
            <option value="fc">FC (256x240)</option>
          </select>
        </div>
      </div>

      <!-- 2. Edge -->
      <div class="panel-section">
        <h2>2. Edge Detect</h2>
        <div class="control-row">
          <label>Enable (Internal Mask)</label>
          <label class="toggle">
            <input type="checkbox" id="edgeEnable" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="control-group" style="margin-top: 5px;">
          <div class="control-row">
            <label>Threshold</label>
            <span id="edgeThreshVal">80</span>
          </div>
          <input type="range" id="edgeThresh" min="0" max="255" value="80">
        </div>
      </div>

      <!-- 3. Palette -->
      <div class="panel-section">
        <h2>3. Palette</h2>
        <div class="control-row">
          <label>Mode</label>
          <select id="palMode">
            <option value="auto">Auto (Median Cut)</option>
            <option value="preset">Preset</option>
          </select>
        </div>
        <div class="control-group" id="palAutoConfig">
          <div class="control-row">
            <label>Colors</label>
            <span id="palColorsVal">16</span>
          </div>
          <input type="range" id="palColors" min="2" max="64" value="16">
        </div>
        <div class="control-row" id="palPresetConfig" style="display:none; margin-top:10px;">
          <label>Preset</label>
          <select id="palPresetList">
            <option value="gb">GAMEBOY (4)</option>
            <option value="pico8">PICO-8 (16)</option>
            <option value="endesga32">ENDESGA-32</option>
          </select>
        </div>
      </div>

      <!-- 4. Color Match -->
      <div class="panel-section">
        <h2>4. Color Match</h2>
        <div class="control-row">
          <label>Distance Space</label>
          <select id="colorSpace">
            <option value="cielab">CIELAB (High Quality)</option>
            <option value="rgb">RGB (Fast)</option>
          </select>
        </div>
      </div>

      <!-- 5. Dither -->
      <div class="panel-section">
        <h2>5. Dither</h2>
        <div class="control-row">
          <label>Algorithm</label>
          <select id="ditherMode">
            <option value="none">None</option>
            <option value="bayer">Ordered (Bayer)</option>
            <option value="fs">Floyd-Steinberg</option>
            <option value="atkinson">Atkinson</option>
          </select>
        </div>
        <div class="control-group">
          <div class="control-row">
            <label>Intensity</label>
            <span id="ditherLevelVal">50%</span>
          </div>
          <input type="range" id="ditherLevel" min="0" max="100" value="50">
        </div>
      </div>

      <!-- 6. Outline -->
      <div class="panel-section">
        <h2>6. Outline Overlay</h2>
        <div class="control-row">
          <label>Show Outline</label>
          <label class="toggle">
            <input type="checkbox" id="outlineEnable" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="control-row" style="margin-top:10px;">
          <label>Color</label>
          <input type="color" id="outlineColor" value="#111111">
        </div>
      </div>

      <!-- 7. Anti-Jaggy -->
      <div class="panel-section">
        <h2>7. Anti-Jaggy</h2>
        <div class="control-group">
          <div class="control-row">
            <label>Passes (Heavy)</label>
            <span id="jaggyPassVal">1</span>
          </div>
          <input type="range" id="jaggyPass" min="1" max="3" value="1">
        </div>
        <button id="btnApplyJaggy" class="primary" style="width:100%; margin-top:10px;">Apply Jaggy Removal</button>
      </div>

      <!-- Render & Export -->
      <div class="panel-section" style="border-bottom:none;">
        <button id="btnRenderAll" style="width:100%; margin-bottom:15px; padding: 10px;">Render All</button>
        <label>Export PNG</label>
        <div class="export-row" style="margin-top:5px;">
          <button id="btnExp1x">1x</button>
          <button id="btnExp2x">2x</button>
          <button id="btnExp4x">4x</button>
          <button id="btnExp8x">8x</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Dummy File Input -->
  <input type="file" id="fileInput" accept="image/*" style="display:none;">

<script>
/**
 * PXL ULTRA ENGINE
 */

const PRESETS = {
  gb: [[15, 56, 15], [48, 98, 48], [139, 172, 15], [155, 188, 15]],
  pico8: [
    [0,0,0],[29,43,83],[126,37,83],[0,135,81],
    [171,82,54],[95,87,79],[194,195,199],[255,241,232],
    [255,0,77],[255,163,0],[255,236,39],[0,228,54],
    [41,173,255],[131,118,156],[255,119,168],[255,204,170]
  ],
  endesga32: [
    [24,20,37],[38,43,68],[89,86,82],[118,66,138],[172,50,50],[217,87,99],[217,160,102],[238,195,154],
    [251,242,54],[153,229,80],[106,190,48],[55,148,110],[75,105,47],[82,75,36],[50,60,57],[63,63,116],
    [48,96,130],[91,110,225],[99,155,255],[95,205,228],[203,219,252],[255,255,255],[155,173,183],[132,126,135],
    [105,106,106],[89,86,82],[118,66,138],[172,50,50],[217,87,99],[217,160,102],[238,195,154],[251,242,54] // padded demo
  ]
};

// --- Color Spaces ---
function rgb2lab(r, g, b) {
  let r_l = r / 255, g_l = g / 255, b_l = b / 255;
  r_l = r_l > 0.04045 ? Math.pow((r_l + 0.055) / 1.055, 2.4) : r_l / 12.92;
  g_l = g_l > 0.04045 ? Math.pow((g_l + 0.055) / 1.055, 2.4) : g_l / 12.92;
  b_l = b_l > 0.04045 ? Math.pow((b_l + 0.055) / 1.055, 2.4) : b_l / 12.92;

  let x = (r_l * 0.4124 + g_l * 0.3576 + b_l * 0.1805) * 100;
  let y = (r_l * 0.2126 + g_l * 0.7152 + b_l * 0.0722) * 100;
  let z = (r_l * 0.0193 + g_l * 0.1192 + b_l * 0.9505) * 100;

  let x_n = x / 95.047, y_n = y / 100.000, z_n = z / 108.883;
  x_n = x_n > 0.008856 ? Math.pow(x_n, 1/3) : (7.787 * x_n) + 16/116;
  y_n = y_n > 0.008856 ? Math.pow(y_n, 1/3) : (7.787 * y_n) + 16/116;
  z_n = z_n > 0.008856 ? Math.pow(z_n, 1/3) : (7.787 * z_n) + 16/116;

  return [
    (116 * y_n) - 16,
    500 * (x_n - y_n),
    200 * (y_n - z_n)
  ];
}

function colorDistanceV(v1, v2) {
  return Math.sqrt((v1[0]-v2[0])**2 + (v1[1]-v2[1])**2 + (v1[2]-v2[2])**2);
}

// Median Cut simplified
function medianCut(pixels, targetDepth) {
  let buckets = [pixels];
  
  while(buckets.length < targetDepth) {
    let targetIdx = -1;
    let maxRange = -1;
    let maxRangeCh = 0;
    
    // Find bucket with largest range
    for(let i=0; i<buckets.length; i++) {
        if(buckets[i].length === 0) continue;
        let minR=255, maxR=0, minG=255, maxG=0, minB=255, maxB=0;
        for(let c of buckets[i]) {
            if(c[0]<minR) minR=c[0]; if(c[0]>maxR) maxR=c[0];
            if(c[1]<minG) minG=c[1]; if(c[1]>maxG) maxG=c[1];
            if(c[2]<minB) minB=c[2]; if(c[2]>maxB) maxB=c[2];
        }
        let rRange = maxR-minR;
        let gRange = maxG-minG;
        let bRange = maxB-minB;
        let vRange = Math.max(rRange, gRange, bRange);
        if(vRange > maxRange && buckets[i].length > 1) {
            maxRange = vRange;
            targetIdx = i;
            if(vRange === rRange) maxRangeCh = 0;
            else if(vRange === gRange) maxRangeCh = 1;
            else maxRangeCh = 2;
        }
    }
    
    if(targetIdx === -1) break; // cannot split further
    
    let bucket = buckets[targetIdx];
    bucket.sort((a,b) => a[maxRangeCh] - b[maxRangeCh]);
    let mid = Math.floor(bucket.length / 2);
    buckets.splice(targetIdx, 1, bucket.slice(0, mid), bucket.slice(mid));
  }
  
  return buckets.map(b => {
    let r=0, g=0, bl=0;
    for(let c of b) { r+=c[0]; g+=c[1]; bl+=c[2]; }
    return [Math.round(r/b.length), Math.round(g/b.length), Math.round(bl/b.length)];
  });
}

// State
let imgElement = null;
let origEdgeMask = null; // high res edge map
let currentPalette = [];
let currentLabPalette = [];

// DOM Elements
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const origCanvas = document.getElementById('origCanvas');
const outCanvas = document.getElementById('outCanvas');
const loading = document.getElementById('loading');
const ctxO = origCanvas.getContext('2d', { willReadFrequently: true });
const ctxR = outCanvas.getContext('2d', { willReadFrequently: true });

// Controls
const UI = {
  resPreset: document.getElementById('resPreset'),
  edgeEnable: document.getElementById('edgeEnable'),
  edgeThresh: document.getElementById('edgeThresh'),
  edgeThreshVal: document.getElementById('edgeThreshVal'),
  palMode: document.getElementById('palMode'),
  palColors: document.getElementById('palColors'),
  palColorsVal: document.getElementById('palColorsVal'),
  palAutoConfig: document.getElementById('palAutoConfig'),
  palPresetConfig: document.getElementById('palPresetConfig'),
  palPresetList: document.getElementById('palPresetList'),
  colorSpace: document.getElementById('colorSpace'),
  ditherMode: document.getElementById('ditherMode'),
  ditherLevel: document.getElementById('ditherLevel'),
  ditherLevelVal: document.getElementById('ditherLevelVal'),
  outlineEnable: document.getElementById('outlineEnable'),
  outlineColor: document.getElementById('outlineColor'),
  btnRenderAll: document.getElementById('btnRenderAll'),
  btnApplyJaggy: document.getElementById('btnApplyJaggy')
};

function readImage(file) {
  if(!file || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  imgElement = new Image();
  imgElement.onload = () => {
    origCanvas.width = imgElement.width;
    origCanvas.height = imgElement.height;
    ctxO.drawImage(imgElement, 0, 0);
    URL.revokeObjectURL(url);
    dropZone.classList.add('hidden');
    origEdgeMask = null; // reset
    runPipeline();
  };
  imgElement.src = url;
}

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('hover');
  if(e.dataTransfer.files.length) readImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if(e.target.files.length) readImage(e.target.files[0]);
});

// Update Labels
UI.edgeThresh.addEventListener('input', e => { UI.edgeThreshVal.textContent = e.target.value; triggerUpdate(); });
UI.palColors.addEventListener('input', e => { UI.palColorsVal.textContent = e.target.value; triggerUpdate(); });
UI.ditherLevel.addEventListener('input', e => { UI.ditherLevelVal.textContent = e.target.value + '%'; triggerUpdate(); });

UI.palMode.addEventListener('change', e => {
  if(e.target.value === 'auto') {
    UI.palAutoConfig.style.display = 'block';
    UI.palPresetConfig.style.display = 'none';
  } else {
    UI.palAutoConfig.style.display = 'none';
    UI.palPresetConfig.style.display = 'flex';
  }
  triggerUpdate();
});

['resPreset','edgeEnable','palPresetList','colorSpace','ditherMode','outlineEnable','outlineColor'].forEach(id => {
  document.getElementById(id).addEventListener('change', triggerUpdate);
});

UI.btnRenderAll.addEventListener('click', runPipeline);

let debounceTimer = null;
function triggerUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    if(imgElement) runPipeline();
  }, 100);
}

// PIPELINE
async function runPipeline() {
  if(!imgElement) return;
  
  loading.style.display = 'flex';
  await new Promise(r => setTimeout(r, 10)); // let UI update
  
  const w = imgElement.width;
  const h = imgElement.height;
  
  // 1. Stage: Downscale
  let targetW = 128, targetH = 128;
  const res = UI.resPreset.value;
  if(res === 'gb') { targetW = 160; targetH = 144; }
  else if(res === 'fc') { targetW = 256; targetH = 240; }
  else {
    const minD = parseInt(res);
    if(w < h) { targetW = minD; targetH = Math.floor(h * (minD/w)); }
    else { targetH = minD; targetW = Math.floor(w * (minD/h)); }
  }
  
  outCanvas.width = targetW;
  outCanvas.height = targetH;
  // fast nearest downscale for now
  ctxR.imageSmoothingEnabled = false;
  ctxR.drawImage(imgElement, 0, 0, targetW, targetH);
  
  let imgData = ctxR.getImageData(0, 0, targetW, targetH);
  let data = imgData.data;
  
  // 3. Stage: Palette
  if(UI.palMode.value === 'auto') {
    // sample pixels for median cut
    let samples = [];
    const step = 4; // optimization
    for(let i=0; i<data.length; i+=step*4) {
      if(data[i+3]>0) samples.push([data[i], data[i+1], data[i+2]]);
    }
    const colorCount = parseInt(UI.palColors.value);
    currentPalette = medianCut(samples, colorCount);
  } else {
    currentPalette = PRESETS[UI.palPresetList.value] || PRESETS.pico8;
  }
  currentLabPalette = currentPalette.map(c => rgb2lab(c[0],c[1],c[2]));
  
  // 4 & 5. Color Match & Dither
  const useLab = UI.colorSpace.value === 'cielab';
  const dMode = UI.ditherMode.value;
  const dLevel = parseInt(UI.ditherLevel.value) / 100;
  
  // Bayer Matrix 4x4
  const bayer4 = [
    [ 0,  8,  2, 10],
    [12,  4, 14,  6],
    [ 3, 11,  1,  9],
    [15,  7, 13,  5]
  ];

  // --- Edge Detect (Sobel on full scale or intermediate) ---
  let edgeMaskData = null;
  if(UI.edgeEnable.checked) {
    // Generate edge map on the original image, then scale it down.
    // For performance, let's do Sobel on the downscaled image but using nearest neighbor might lose lines.
    // Let's draw the original image to a temp canvas of target size but smooth! to get a good luminance map.
    const tempC = document.createElement('canvas');
    tempC.width = targetW; tempC.height = targetH;
    const tCtx = tempC.getContext('2d');
    tCtx.imageSmoothingEnabled = true; // smooth downscale for edge detecting
    tCtx.drawImage(imgElement, 0, 0, targetW, targetH);
    
    const smoothData = tCtx.getImageData(0,0,targetW,targetH).data;
    edgeMaskData = new Uint8Array(targetW * targetH);
    const th = parseInt(UI.edgeThresh.value);
    
    const sobelX = [-1,0,1, -2,0,2, -1,0,1];
    const sobelY = [-1,-2,-1, 0,0,0, 1,2,1];
    
    for(let y=1; y<targetH-1; y++) {
      for(let x=1; x<targetW-1; x++) {
        let gx=0, gy=0, px=-1, py=-1;
        for(let i=0; i<9; i++) {
          let cIdx = ((y+py)*targetW + (x+px))*4;
          let lum = smoothData[cIdx]*0.3 + smoothData[cIdx+1]*0.59 + smoothData[cIdx+2]*0.11;
          gx += lum * sobelX[i];
          gy += lum * sobelY[i];
          px++; if(px>1){px=-1; py++;}
        }
        let mag = Math.sqrt(gx*gx + gy*gy);
        edgeMaskData[y*targetW + x] = mag > th ? 255 : 0;
      }
    }
  }

  // --- Main Pixel Processing ---
  for(let y=0; y<targetH; y++) {
    for(let x=0; x<targetW; x++) {
      let idx = (y*targetW + x)*4;
      let r = data[idx], g = data[idx+1], b = data[idx+2];
      
      if(dMode === 'bayer' && dLevel > 0) {
        let th = (bayer4[y%4][x%4] / 16) - 0.5;
        let p = dLevel * 64 * th; 
        r = Math.min(255, Math.max(0, r + p));
        g = Math.min(255, Math.max(0, g + p));
        b = Math.min(255, Math.max(0, b + p));
      }
      
      // Match
      let bestIdx = 0;
      let minDis = 9999999;
      
      let pLab = useLab ? rgb2lab(r,g,b) : null;

      for(let i=0; i<currentPalette.length; i++) {
        let d = 0;
        if(useLab) {
          d = colorDistanceV(pLab, currentLabPalette[i]);
        } else {
          d = colorDistanceV([r,g,b], currentPalette[i]);
        }
        if(d < minDis) { minDis = d; bestIdx = i; }
      }
      
      let match = currentPalette[bestIdx];
      let oR = match[0], oG = match[1], oB = match[2];
      
      // Error diffusion
      if(dMode === 'fs' && dLevel > 0) {
        let eR = (r - oR)*dLevel; let eG = (g - oG)*dLevel; let eB = (b - oB)*dLevel;
        if(x<targetW-1) { d_add(data, idx+4, eR*7/16, eG*7/16, eB*7/16); }
        if(y<targetH-1) {
          if(x>0) { d_add(data, idx+targetW*4-4, eR*3/16, eG*3/16, eB*3/16); }
          d_add(data, idx+targetW*4, eR*5/16, eG*5/16, eB*5/16);
          if(x<targetW-1) { d_add(data, idx+targetW*4+4, eR*1/16, eG*1/16, eB*1/16); }
        }
      }
      
      data[idx] = oR; data[idx+1] = oG; data[idx+2] = oB; data[idx+3] = 255;
    }
  }
  
  ctxR.putImageData(imgData, 0, 0);
  
  // 6. Outline Overlay
  if(UI.outlineEnable.checked && edgeMaskData) {
    let oc = UI.outlineColor.value;
    let chr = parseInt(oc.substr(1,2),16);
    let chg = parseInt(oc.substr(3,2),16);
    let chb = parseInt(oc.substr(5,2),16);
    
    for(let i=0; i<edgeMaskData.length; i++) {
        if(edgeMaskData[i] > 0) {
            data[i*4] = chr;
            data[i*4+1] = chg;
            data[i*4+2] = chb;
            // leave alpha intact
        }
    }
    ctxR.putImageData(imgData, 0, 0);
  }
  
  loading.style.display = 'none';
}

function d_add(data, idx, r, g, b) {
  data[idx] = Math.max(0,Math.min(255, data[idx]+r));
  data[idx+1] = Math.max(0,Math.min(255, data[idx+1]+g));
  data[idx+2] = Math.max(0,Math.min(255, data[idx+2]+b));
}

// Export logic
function exportScale(scale) {
    if(!imgElement) return;
    const cw = outCanvas.width;
    const ch = outCanvas.height;
    const expC = document.createElement('canvas');
    expC.width = cw * scale;
    expC.height = ch * scale;
    const eCtx = expC.getContext('2d');
    eCtx.imageSmoothingEnabled = false;
    eCtx.drawImage(outCanvas, 0, 0, expC.width, expC.height);
    
    const link = document.createElement('a');
    link.download = `pxl-ultra-${Date.now()}.png`;
    link.href = expC.toDataURL('image/png');
    link.click();
}

document.getElementById('btnExp1x').onclick = () => exportScale(1);
document.getElementById('btnExp2x').onclick = () => exportScale(2);
document.getElementById('btnExp4x').onclick = () => exportScale(4);
document.getElementById('btnExp8x').onclick = () => exportScale(8);

</script>
