<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DESU™</title>
    <link rel="stylesheet" href="style.css">
    <script src="./favicon.js"></script>
</head>

<body>
    <div id="app-container">
        <!-- 背景画像 -->
        <img class="background" id="backgroundImage" src="" alt="背景">

        <!-- フェード用オーバーレイ -->
        <div class="fade-overlay" id="fadeOverlay"></div>

        <!-- スタートプロンプト -->
        <div class="start-prompt" id="startPrompt">
            <span>声をかける</span>
        </div>

        <!-- テキストウィンドウ -->
        <div class="text-window" id="textWindow">
            <img class="face-icon" id="faceIcon" src="" alt="キャラクター">
            <div class="text-area">
                <div class="name-display" id="nameDisplay"></div>
                <div class="text-content" id="textContent"></div>
            </div>
            <div class="continue-icon" id="continueIcon">▼</div>
        </div>

        <!-- メニュー画面 -->
        <div class="menu-screen" id="menuScreen">
            <div class="close-container">
                <span class="close-button" id="closeMenuButton">×</span>
            </div>
            <div class="menu-container">
                <span class="menu-button" id="episodesLink"><span>記録を見る</span></span>
                <span class="menu-button" id="charactersLink"><span>尋ねる</span></span>
                <span class="menu-button" id="toolsLink"><span>支給品を得る</span></span>
            </div>
        </div>

        <!-- ツール画面 (支給品) -->
        <div class="sub-screen" id="toolsScreen">
            <div class="close-container">
                <span class="close-button" id="closeToolsButton">×</span>
            </div>
            <div class="sub-container list-container">
                <div class="list-item">
                    <a href="./draw/" class="list-button">DRAW</a>
                    <span class="tool-info-btn" data-tool="DRAW">?</span>
                </div>
                <div class="list-item">
                    <a href="./beat/" class="list-button">BEAT</a>
                    <span class="tool-info-btn" data-tool="BEAT">?</span>
                </div>
                <div class="list-item">
                    <a href="./beep/" class="list-button">BEEP</a>
                    <span class="tool-info-btn" data-tool="BEEP">?</span>
                </div>
                <div class="list-item">
                    <a href="./pattern/" class="list-button">PATTERN</a>
                    <span class="tool-info-btn" data-tool="PATTERN">?</span>
                </div>
                <div class="list-item">
                    <a href="./emojie/" class="list-button">EMOJIE</a>
                    <span class="tool-info-btn" data-tool="EMOJIE">?</span>
                </div>
                <div class="list-item">
                    <a href="./tone/" class="list-button">TONE</a>
                    <span class="tool-info-btn" data-tool="TONE">?</span>
                </div>
                <div class="list-item">
                    <a href="./noise/" class="list-button">NOISE</a>
                    <span class="tool-info-btn" data-tool="NOISE">?</span>
                </div>
            </div>
        </div>

        <!-- エピソード画面 (記録) -->
        <div class="sub-screen" id="episodesScreen">
            <div class="close-container">
                <span class="close-button" id="closeEpisodesButton">×</span>
            </div>
            <div class="sub-container">
                <a href="./ep_gara/" class="list-button">ガラ</a>
                <a href="./ep_hen/" class="list-button">ヘン</a>
                <a href="./ep_shita/" class="list-button">下</a>
            </div>
        </div>

        <!-- 尋ねる画面 (旧 名簿) -->
        <div class="sub-screen" id="charactersScreen">
            <div class="close-container">
                <span class="close-button" id="closeCharactersButton">×</span>
            </div>

            <div class="characters-content">
                <!-- Character Icon Navigation (Photos to ask about) -->
                <div class="character-icons">
                    <button class="character-icon" data-character="desu">
                        <img src="./characters/desu_icon.jpg" alt="デス">
                    </button>
                    <button class="character-icon" data-character="sakana">
                        <img src="./characters/sakana_icon.jpg" alt="サカナ">
                    </button>
                    <button class="character-icon" data-character="shi">
                        <img src="./characters/shi_icon.jpg" alt="し">
                    </button>
                    <button class="character-icon" data-character="holem">
                        <img src="./characters/holem_icon.jpg" alt="ホーレム">
                    </button>
                    <button class="character-icon" data-character="wpy">
                        <img src="./characters/wpy_icon.jpg" alt="wpy">
                    </button>
                </div>

                <!-- Display area for the selected character's photo -->
                <div class="character-display" id="characterDisplay" style="display: none;">
                    <img id="characterLargeImage" src="" alt="Selected Character" class="character-image">
                </div>
            </div>
        </div>

        <div class="footer">&copy; 2026 <a href="https://warpshoot.github.io/" target="_blank"
                rel="noopener noreferrer">wpy</a> / last update 20260227</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
