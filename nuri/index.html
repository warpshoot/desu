<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DESU™ NURI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="/desu/favicon.js" defer></script>
</head>
<body>

  <!-- Canvas area -->
  <div id="canvas-wrap">
    <canvas id="drawing-canvas"></canvas>
  </div>

  <!-- Cursor overlay (full viewport, pointer-events: none) -->
  <canvas id="cursor-canvas"></canvas>

  <!-- Toolbar -->
  <div id="toolbar" class="right-hand">
    <button class="tool-btn active" data-tool="brush" id="btn-brush">
      <svg viewBox="0 0 24 24"><path d="M4 20 Q8 12 13 9 Q18 6 20 4"/><path d="M13 9 Q15 11 14 14 Q12 17 9 17 Q6 17 5 19 Q4 21 4 20"/></svg>
    </button>
    <button class="tool-btn" data-tool="eraser" id="btn-eraser">
      <svg viewBox="0 0 24 24"><rect x="3" y="12" width="10" height="8" rx="1.5"/><path d="M13 16 L21 8 L16 3 L8 11"/><path d="M3 20 L21 20"/></svg>
    </button>
    <button class="tool-btn" data-tool="eyedropper" id="btn-eyedropper">
      <svg viewBox="0 0 24 24"><path d="M9 15 L5 19 Q4 20 5 21 Q6 22 7 21 L11 17"/><path d="M11 17 L19 9 Q21 7 20 5 Q19 3 17 4 L9 12"/><path d="M9 12 L12 15"/></svg>
    </button>
    <button class="tool-btn" id="btn-color">
      <div id="color-swatch"></div>
    </button>
    <button class="tool-btn" id="btn-undo" disabled>
      <svg viewBox="0 0 24 24"><path d="M6 9 L3 12 L6 15"/><path d="M3 12 Q3 6 9 5 Q15 4 18 8 Q21 12 18 17 Q15 22 9 21"/></svg>
    </button>
    <button class="tool-btn" id="btn-redo" disabled>
      <svg viewBox="0 0 24 24"><path d="M18 9 L21 12 L18 15"/><path d="M21 12 Q21 6 15 5 Q9 4 6 8 Q3 12 6 17 Q9 22 15 21"/></svg>
    </button>
    <button class="tool-btn" id="btn-menu">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5" class="dot"/><circle cx="12" cy="12" r="1.5" class="dot"/><circle cx="12" cy="19" r="1.5" class="dot"/></svg>
    </button>
  </div>

  <!-- Sliders (adjacent to toolbar) -->
  <div id="sliders" class="right-hand">
    <div class="slider-group">
      <span class="slider-val" id="size-value">30</span>
      <div class="v-slider-wrap">
        <input type="range" class="v-slider" id="size-slider" min="2" max="150" value="30">
      </div>
      <span class="slider-label">SIZE</span>
    </div>
    <div class="slider-group">
      <span class="slider-val" id="opacity-value">80%</span>
      <div class="v-slider-wrap">
        <input type="range" class="v-slider" id="opacity-slider" min="1" max="100" value="80">
      </div>
      <span class="slider-label">OPAC</span>
    </div>
  </div>

  <!-- Color picker panel -->
  <div id="color-panel" class="panel hidden">
    <div id="color-preview-row">
      <div id="color-preview"></div>
    </div>
    <canvas id="sb-canvas" width="240" height="200"></canvas>
    <canvas id="hue-canvas" width="240" height="22"></canvas>
    <div id="recent-colors"></div>
  </div>

  <!-- Zoom reset -->
  <button id="btn-zoom-reset">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M8 11 L14 11 M11 8 L11 14"/><path d="M16 16 L21 21"/></svg>
  </button>

  <!-- Settings panel -->
  <div id="settings-panel" class="hidden">
    <div id="settings-content">
      <div class="settings-header">
        <span class="settings-title">DESU™ NURI</span>
        <button id="btn-close-settings">閉じる</button>
      </div>

      <div class="setting-section">
        <div class="setting-label">利き手</div>
        <div class="btn-group" id="settings-hand-group">
          <button class="choice-btn" data-hand="right">右利き</button>
          <button class="choice-btn" data-hand="left">左利き</button>
        </div>
      </div>

      <div class="setting-section">
        <div class="setting-label">オフセット描画</div>
        <button class="toggle-btn active" id="offset-toggle">ON</button>
      </div>

      <div class="setting-section" id="offset-amount-section">
        <div class="setting-label">オフセット量: <span id="offset-value">60</span>px</div>
        <input type="range" id="offset-slider" min="10" max="200" value="60">
      </div>

      <div class="setting-section">
        <button class="action-btn" id="btn-export">PNG書き出し</button>
      </div>

      <div class="setting-section">
        <button class="action-btn" id="btn-new-canvas">新規作成</button>
      </div>
    </div>
  </div>

  <!-- Welcome / New canvas dialog -->
  <div id="welcome-dialog">
    <div id="welcome-content">
      <div class="welcome-logo">DESU™</div>
      <div class="welcome-title">NURI</div>
      <div class="welcome-sub">厚塗りペイント</div>

      <div id="welcome-resume" class="hidden">
        <p class="welcome-msg">保存データがあります</p>
        <button class="action-btn primary large" id="btn-resume">続きから</button>
        <button class="action-btn large" id="btn-welcome-new">新規作成</button>
      </div>

      <div id="welcome-new">
        <div class="setting-label">利き手</div>
        <div class="btn-group" id="hand-group">
          <button class="choice-btn active" data-hand="right">右利き</button>
          <button class="choice-btn" data-hand="left">左利き</button>
        </div>

        <div class="setting-label" style="margin-top:24px">キャンバスサイズ</div>
        <div class="btn-group col" id="size-group">
          <button class="choice-btn" data-size="1:1">
            <span class="size-name">正方形</span>
            <span class="size-dim">1080 × 1080</span>
          </button>
          <button class="choice-btn active" data-size="4:5">
            <span class="size-name">縦長</span>
            <span class="size-dim">1080 × 1350</span>
          </button>
          <button class="choice-btn" data-size="9:16">
            <span class="size-name">ストーリーズ</span>
            <span class="size-dim">1080 × 1920</span>
          </button>
        </div>

        <button class="action-btn primary large" id="btn-start">はじめる</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
