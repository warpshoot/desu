<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DESU™ ink</title>
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="../favicon.js"></script>
</head>

<body class="light">
    <!-- キャンバス白背景 -->
    <div id="canvas-background"></div>

    <!-- 動的レイヤーコンテナ (canvas要素はJSで追加される) -->
    <div id="layer-container"></div>

    <!-- 投げ縄描画用 -->
    <canvas id="lasso-canvas"></canvas>

    <!-- 保存範囲選択用 -->
    <canvas id="selection-canvas" style="display:none;"></canvas>

    <!-- ストロークプレビュー用キャンバス (不透明度対応) -->
    <canvas id="stroke-canvas"></canvas>

    <!-- イベントキャプチャ用の透明キャンバス (常に最上位) -->
    <canvas id="event-canvas"></canvas>

      <!-- 左下ツールバー: ツール選択のみ -->
    <div id="toolbar-left">
        <!-- ツールパネル — 3モード -->
        <div id="tool-panel">
            <div class="mode-btn active" id="mode-pen" data-mode="pen" title="ペン">
                <img src="icons/pen.png" class="tool-icon mode-icon" data-sub="pen" alt="Pen">
                <img src="icons/stipple.svg" class="tool-icon mode-icon" data-sub="stipple" style="filter: brightness(0); display:none;" alt="Stipple">
                <div class="hold-progress"></div>
            </div>
            <div class="mode-btn" id="mode-fill" data-mode="fill" title="塗り">
                <img src="icons/bet.png" class="tool-icon mode-icon" data-sub="fill" alt="Fill">
                <img src="icons/tone.png" class="tool-icon mode-icon" data-sub="tone" style="display:none;" alt="Tone">
                <div class="hold-progress"></div>
            </div>
            <div class="mode-btn" id="mode-eraser" data-mode="eraser" title="消しゴム">
                <img src="icons/er2.svg" class="tool-icon mode-icon" data-sub="pen" style="filter: brightness(0);" alt="Eraser Pen">
                <img src="icons/er1.png" class="tool-icon mode-icon" data-sub="lasso" style="filter: brightness(0); display:none;" alt="Eraser Lasso">
                <svg class="tool-icon mode-icon" data-sub="clear" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M10 11v6M14 11v6"/><path d="M5 7l1 12a2 2 0 002 2h8a2 2 0 002-2l1-12"/><path d="M9 7V4h6v3"/></svg>
                <div class="hold-progress"></div>
            </div>
        </div>

        <!-- 補助操作パネル (Undo / Redo) -->
        <div id="aux-panel">
            <div class="tool-btn" id="btn-undo" title="元に戻す">
                <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/><path d="M4 9h11a5 5 0 0 1 5 5v5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
            <div class="tool-btn" id="btn-redo" title="やり直し">
                <svg viewBox="0 0 24 24"><path d="M15 14l5-5-5-5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/><path d="M20 9H9a5 5 0 0 0-5 5v5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
        </div>

        <!-- ブラシサイズスライダー -->
        <div id="size-slider-container">
            <div id="sizeDisplay">3</div>
            <input type="range" id="brushSize" min="0" max="1000" value="0">
        </div>
        <!-- ブラシパレット (5スロット) -->
        <div id="brush-palette">
            <!-- JSで動的生成 -->
        </div>
    </div>

    <!-- フライアウトサブツールメニュー (toolbar-leftの外に配置:
         backdrop-filterがcontaining blockを作るためfixed配置が壊れる) -->
    <div id="flyout-menu" class="flyout-menu hidden">
        <!-- JSで動的に生成 -->
    </div>

    <!-- 右下レイヤーパネル -->
    <div id="layer-panel">
        <button id="addLayerBtn" class="layer-add-btn">
            +
        </button>
        <div id="layer-buttons"></div>
    </div>

    <!-- 右上ツールバー -->
    <div id="toolbar-right">


        <div class="tool-btn" id="fileBtn">
            <img src="icons/file.svg" alt="File" style="width: 24px; height: 24px;">
        </div>

        <div class="tool-btn" id="saveBtn">
            <svg viewBox="0 0 24 24">
                <path d="M12 4 L12 16 M6 12 L12 18 L18 12" />
                <path d="M4 20 L20 20" />
            </svg>
        </div>
    </div>

    <!-- ズームリセットボタン -->
    <div id="resetZoomBtn">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="8" />
            <path d="M12 7 L12 17 M7 12 L17 12" />
        </svg>
    </div>

    <!-- ファイル管理メニュー -->
    <div id="file-menu" class="tool-menu hidden">
        <div class="menu-item" id="newProjectBtn">
            <span>新規作成</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="exportProjectBtn">
            <span>プロジェクト保存 (.json)</span>
        </div>
        <div class="menu-item" id="importProjectBtn">
            <span>プロジェクト読込</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="exportConfigBtn">
            <span>設定の書き出し</span>
        </div>
        <div class="menu-item" id="importConfigBtn">
            <span>設定の読み込み</span>
        </div>
        
        <!-- Project Save Input -->
        <input type="file" id="fileInput" accept=".json,.desu" style="display:none;">
        <!-- Config Save Input -->
        <input type="file" id="configInput" accept=".json,.desuconfig" style="display:none;">
    </div>

    <!-- 保存UI -->
    <div id="save-overlay"></div>
    <div id="save-ui">
        <h3>範囲をドラッグして選択</h3>
        <div id="selection-size" style="display:none; font-size: 13px; color: #666; margin-bottom: 8px;"></div>

        <div class="option-group aspect-ratio-group">
            <div class="option-group-label">縦横比</div>
            <div class="option-buttons">
                <button class="option-btn active" data-aspect="free">自由</button>
                <button class="option-btn" data-aspect="1:1">1:1</button>
                <button class="option-btn" data-aspect="4:5">4:5</button>
                <button class="option-btn" data-aspect="16:9">16:9</button>
                <button class="option-btn" data-aspect="9:16">9:16</button>
            </div>
        </div>

        <div class="option-group">
            <div class="option-group-label">倍率</div>
            <div class="option-buttons">
                <button class="option-btn active" data-scale="1">1x</button>
                <button class="option-btn" data-scale="2">2x</button>
                <button class="option-btn" data-scale="3">3x</button>
            </div>
        </div>


        <label>
            <input type="checkbox" id="transparentBg">
            背景透過
        </label>

        <div>
            <button class="save-btn" id="saveAllBtn">全体を保存</button>
            <button class="save-btn primary" id="confirmSelectionBtn" style="display:none;">確定</button>
            <button class="save-btn" id="copyClipboardBtn" style="display:none;">コピー</button>
            <button class="save-btn" id="redoSelectionBtn" style="display:none;">やり直し</button>
            <button class="save-btn" id="cancelSaveBtn">閉じる</button>
        </div>
    </div>

    <!-- デバッグログ (削除済み) -->

    <!-- クレジットボタンとモーダル -->
    <div id="credit-btn">?</div>
    <div id="credit-modal">
        <div id="credit-content">
            <div class="credit-row">
                <span class="credit-key">名称</span>
                <span class="credit-val">DESU™ ink</span>
            </div>
            <div class="credit-row">
                <span class="credit-key">支給元</span>
                <a href="https://warpshoot.github.io/desu/" target="_blank" class="credit-val">warpshoot.github.io/desu</a>
            </div>
            <div class="credit-row">
                <span class="credit-key">製造</span>
                <a href="https://warpshoot.github.io/" target="_blank" class="credit-val">wpy</a>
            </div>
            <hr class="credit-divider">
            <div class="credit-row">
                <span class="credit-key">説明書</span>
                <a href="ink_MANUAL.md" target="_blank" class="credit-manual-link">人間向け</a>
            </div>
        </div>
    </div>

    <!-- 汎用確認モーダル -->
    <div id="confirm-modal" class="hidden">
        <div id="confirm-content">
            <p id="confirm-message">メッセージ</p>
            <label class="confirm-checkbox-label">
                <input type="checkbox" id="confirm-suppress-check">
                次回以降表示しない
            </label>
            <div class="confirm-buttons">
                <button id="confirm-cancel-btn">キャンセル</button>
                <button id="confirm-ok-btn" class="primary">OK</button>
            </div>
        </div>
    </div>

    <!-- (旧ツール選択メニューは flyout-menu に統合済み) -->

    <!-- トーン選択メニュー (ツールバーの上に表示) -->
    <div id="tone-menu" class="tone-menu hidden">
        <div class="tone-menu-header">
            <div id="tone-menu-pin" class="tone-menu-pin" title="メニューを固定"></div>
        </div>
        <div id="tone-items" class="tone-items">
            <!-- JSで動的に生成 -->
        </div>
    </div>

    <!-- レイヤー操作メニュー (長押しポップオーバー) -->
    <div id="layer-menu" class="tool-menu layer-menu-horizontal hidden">
        <input type="range" id="layerOpacitySlider" min="0" max="100" value="100" title="不透明度">
        <div class="menu-item layer-visible-toggle" title="表示/非表示">
            <svg viewBox="0 0 24 24" class="eye-icon">
                <path d="M2 12 C2 12 5 5 12 5 C19 5 22 12 22 12 C22 12 19 19 12 19 C5 19 2 12 2 12 Z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
        </div>
        <div class="menu-item layer-move-btn" data-dir="up" title="上へ">
            <svg viewBox="0 0 24 24">
                <path d="M12 8 L6 14 L18 14 Z" fill="currentColor" />
            </svg>
        </div>
        <div class="menu-item layer-move-btn" data-dir="down" title="下へ">
            <svg viewBox="0 0 24 24">
                <path d="M12 16 L6 10 L18 10 Z" fill="currentColor" />
            </svg>
        </div>
        <div class="menu-item layer-merge-btn" title="下のレイヤーに統合">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M7 21h10" />
                <path d="M12 3v14" />
                <path d="M8 13l4 4 4-4" />
            </svg>
        </div>
        <div class="menu-item layer-delete danger" title="削除">
            <svg viewBox="0 0 24 24">
                <path d="M6 6 L18 18 M6 18 L18 6" />
            </svg>
        </div>
    </div>



    <!-- 投げ縄設定パネル -->
    <div id="fill-settings-panel" class="hidden">
        <div id="fill-settings-header">
            <span id="fill-settings-name">投げ縄設定</span>
            <button id="fill-settings-close">×</button>
        </div>
        <div id="fill-settings-body">
            <div class="bs-row" id="fs-subtool-row">
                <label>サブツール</label>
                <select id="fs-subtool">
                    <option value="fill">塗りつぶし</option>
                    <option value="tone">トーン</option>
                </select>
            </div>
            <div class="bs-row" id="fs-opacity-row">
                <label>不透明度 <span id="fs-opacity-val">100</span>%</label>
                <input type="range" id="fs-opacity" min="1" max="100" value="100">
            </div>
            <div class="bs-row bs-toggles" id="fs-bucket-row">
                <label class="bs-toggle-label">
                    <input type="checkbox" id="fs-bucket" checked> バケツ (タップで塗りつぶし)
                </label>
            </div>
            <div class="bs-row" id="fs-tolerance-row">
                <label>バケツ許容値</label>
                <select id="fs-tolerance">
                    <option value="strict">厳密</option>
                    <option value="normal" selected>標準</option>
                    <option value="loose">ゆるい</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 消しゴム設定パネル -->
    <div id="eraser-settings-panel" class="hidden">
        <div id="eraser-settings-header">
            <span id="eraser-settings-name">消しゴム設定</span>
            <button id="eraser-settings-close">×</button>
        </div>
        <div id="eraser-settings-body">
            <div class="bs-row" id="es-subtool-row">
                <label>サブツール</label>
                <select id="es-subtool">
                    <option value="pen">ペン</option>
                    <option value="lasso">投げ縄</option>
                    <option value="clear">全消し</option>
                </select>
            </div>
            <div class="bs-row bs-toggles" id="es-bucket-row">
                <label class="bs-toggle-label">
                    <input type="checkbox" id="es-bucket" checked> バケツ (タップで消去)
                </label>
            </div>
            <div class="bs-row" id="es-tolerance-row">
                <label>バケツ許容値</label>
                <select id="es-tolerance">
                    <option value="strict">厳密</option>
                    <option value="normal" selected>標準</option>
                    <option value="loose">ゆるい</option>
                </select>
            </div>
        </div>
    </div>

    <!-- ブラシ設定パネル -->
    <div id="brush-settings-panel" class="hidden">
        <div id="brush-settings-header">
            <span id="brush-settings-name">ブラシ設定</span>
            <button id="brush-settings-close">×</button>
        </div>
        <div id="brush-settings-body">
            <div class="bs-row" id="bs-subtool-row">
                <label>サブツール</label>
                <select id="bs-subtool">
                    <option value="pen">ペン</option>
                    <option value="stipple">点描</option>
                </select>
            </div>

            <!-- 点描専用設定 -->
            <div class="bs-row" id="bs-density-row">
                <label>密度 <span id="bs-density-val">5</span></label>
                <input type="range" id="bs-density" min="1" max="20" value="5">
            </div>
            <div class="bs-row bs-toggles" id="bs-pressure-density-row">
                <label class="bs-toggle-label">
                    <input type="checkbox" id="bs-pressure-density" checked> 筆圧→密度
                </label>
            </div>

            <!-- ペン専用設定 -->
            <div class="bs-row" id="bs-opacity-row">
                <label>不透明度 <span id="bs-opacity-val">100</span>%</label>
                <input type="range" id="bs-opacity" min="1" max="100" value="100">
            </div>
            <div class="bs-row bs-toggles" id="bs-pen-pressure-row">
                <label class="bs-toggle-label">
                    <input type="checkbox" id="bs-pressure-size"> 筆圧→幅
                </label>
            </div>
            <div class="bs-row bs-toggles" id="bs-binary-row">
                <label class="bs-toggle-label">
                    <input type="checkbox" id="bs-binary"> 2値ピクセル
                </label>
            </div>

            <!-- 筆圧カーブ設定 -->
            <div class="bs-row" id="bs-pressure-curve-row">
                <label>筆圧カーブ <span id="bs-pressure-curve-val">1.0</span></label>
                <div class="bs-pressure-curve-container">
                    <input type="range" id="bs-pressure-curve" min="0.3" max="3.0" step="0.1" value="1.0">
                </div>
            </div>

            <!-- 手ぶれ補正 (糸引きスタビライザー) -->
            <div class="bs-row bs-toggles" id="bs-stabilizer-row">
                <label class="bs-toggle-label">
                    <input type="checkbox" id="bs-stabilizer"> 手ぶれ補正
                </label>
            </div>
            <div class="bs-row" id="bs-stabilizer-dist-row">
                <label>補正距離 <span id="bs-stabilizer-dist-val">20</span></label>
                <input type="range" id="bs-stabilizer-dist" min="5" max="150" value="20">
            </div>
            <div class="bs-row bs-toggles" id="bs-stab-viz-row">
                <label class="bs-toggle-label">
                    <input type="checkbox" id="bs-stab-string" checked> ライン
                </label>
                <label class="bs-toggle-label">
                    <input type="checkbox" id="bs-stab-guide" checked> ガイド
                </label>
            </div>

        </div>
    </div>

    <!-- Debug Display (set DEBUG_MODE = true in ui.js to enable) -->
    <div id="debug-display"
        style="display: none; position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; z-index: 10000; pointer-events: none; border-radius: 5px;">
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>

</html>
