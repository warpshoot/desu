<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DESU&trade; edgecam</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #7fff6a;
      --text: #ccc;
      --text-dim: #666;
      --bg: #0a0a0a;
      --border: rgba(255,255,255,0.13);
    }

    body {
      background: #000;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── VIEWFINDER ── */
    #viewfinder {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #contourCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    #startOverlay {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #startOverlay.hidden { display: none; }

    .start-title {
      font-size: 12px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.25);
    }

    .start-hint {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.12);
    }

    /* ── TOP BAR ── */
    #topBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 14px) 16px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
      pointer-events: none;
    }

    #topBar > * { pointer-events: auto; }

    #credit-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
    }

    #credit-btn:hover { border-color: var(--accent); }

    #status {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      transition: color 0.2s;
    }

    #status.live   { color: var(--accent); }
    #status.frozen { color: #ffb300; }
    #status.image  { color: #6699ff; }

    #settingsBtn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }

    #settingsBtn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── SETTINGS PANEL ── */
    #settingsPanel {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 15;
      background: rgba(10,10,10,0.3);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-bottom: 1px solid var(--border);
      padding: calc(max(env(safe-area-inset-top), 14px) + 54px) 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transform: translateY(-110%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #settingsPanel.open { transform: translateY(0); }

    .p-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .p-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      min-width: 52px;
    }

    .p-slider-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .p-slider-wrap input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      padding: 11px 0;
      background-clip: content-box;
    }

    .p-slider-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    .p-slider-wrap input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      border: none;
    }

    .p-val {
      font-size: 11px;
      color: var(--text);
      min-width: 28px;
      text-align: right;
    }

    /* Effect pill buttons */
    .fx-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
    }

    .fx-pill {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.12s;
    }

    .fx-pill.on {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(127,255,106,0.1);
    }

    .fx-pill.disabled {
      opacity: 0.28;
      pointer-events: none;
    }

    /* Color swatches */
    .color-swatches {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .swatch-label {
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .swatch-input {
      position: absolute;
      opacity: 0; width: 0; height: 0;
    }

    .swatch-display {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      background-clip: padding-box;
    }

    .swatch-input:checked + .swatch-display {
      border-color: #fff;
      transform: scale(1.15);
    }

    .swatch-display::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #000;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .swatch-input:checked + .swatch-display::after { opacity: 0.7; }

    /* ── BOTTOM BAR ── */
    #bottomBar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 28px calc(max(env(safe-area-inset-bottom), 18px) + 6px);
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
    }

    .bb-side {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 88px;
    }

    .bb-side.right { justify-content: flex-end; }

    .bb-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      padding: 4px 5px;
      border-radius: 6px;
      transition: opacity 0.15s;
    }

    .bb-btn:disabled {
      opacity: 0.28;
      pointer-events: none;
    }

    .bb-btn svg { width: 22px; height: 22px; }

    .bb-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.55);
    }

    /* Shutter */
    #shutterBtn {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(4px) saturate(120%);
      -webkit-backdrop-filter: blur(4px) saturate(120%);
      cursor: pointer;
      position: relative;
      transition: transform 0.08s, background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    #shutterBtn:active { transform: scale(0.91); }

    /* inner square (frozen indicator only) */
    #shutterBtn::after {
      content: '';
      position: absolute;
      inset: 18px;
      border-radius: 4px;
      background: transparent;
      transition: all 0.2s;
    }

    /* frozen: brighter ring + accent square inside */
    #shutterBtn.frozen {
      border-color: rgba(255,255,255,0.85);
    }

    #shutterBtn.frozen::after {
      background: var(--accent);
    }

    /* ── CREDIT MODAL ── */
    #credit-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #credit-modal.visible { display: flex; }

    #credit-content {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 20px 24px;
      font-family: 'DM Mono', monospace;
      width: 300px;
      max-width: calc(100vw - 40px);
      border-radius: 8px;
    }

    .credit-row { display: flex; gap: 12px; line-height: 1.9; }
    .credit-key { color: var(--text-dim); font-size: 11px; min-width: 4em; flex-shrink: 0; }
    .credit-val { font-size: 11px; color: var(--text); text-decoration: none; }
    a.credit-val { text-decoration: underline; }
    a.credit-val:hover { color: var(--accent); }
    .credit-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .credit-manual-link { font-size: 11px; color: var(--text); text-decoration: underline; margin-right: 16px; }
    .credit-manual-link:hover { color: var(--accent); }

    /* ── SAVE MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      z-index: 300;
      padding: 16px 16px 0;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: rgba(14,14,14,0.97);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 13px; font-weight: 500; letter-spacing: 0.15em; color: var(--accent); }
    .modal-close { background: transparent; border: none; color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 16px; cursor: pointer; padding: 2px 6px; line-height: 1; }
    .modal-close:hover { color: var(--text); }

    .modal-preview-wrap {
      width: 100%; min-height: 200px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    #modalPreview {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .modal-row { display: flex; align-items: center; gap: 8px; }
    .modal-label { font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); min-width: 52px; }
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .seg-group { display: flex; gap: 4px; }

    .seg-btn {
      padding: 5px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.05em;
      cursor: pointer; border-radius: 3px; transition: all 0.12s;
    }

    .seg-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(127,255,106,0.08); }

    .btn {
      flex: 1; padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 3px; transition: all 0.15s;
    }

    .btn:hover:not(:disabled) { border-color: var(--text); color: var(--text); }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.primary:hover:not(:disabled) { background: rgba(127,255,106,0.08); }
    .btn:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>

  <!-- Viewfinder -->
  <div id="viewfinder">
    <canvas id="contourCanvas"></canvas>
    <div id="startOverlay">
      <div class="start-title">EDGECAM</div>
      <div class="start-hint">tap shutter to start</div>
    </div>
  </div>

  <!-- Hidden -->
  <video id="videoFeed" playsinline autoplay muted style="display:none;"></video>
  <canvas id="sampleCanvas" style="display:none;"></canvas>
  <input type="file" id="fileInput" accept="image/*" style="display:none;">

  <!-- Top bar -->
  <div id="topBar">
    <button id="credit-btn">?</button>
    <div id="status">STANDBY</div>
    <button id="settingsBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Settings panel (slides down) -->
  <div id="settingsPanel">
    <div class="p-row">
      <div class="p-label">LEVELS</div>
      <div class="p-slider-wrap">
        <input type="range" id="levels" min="2" max="24" value="8" step="1">
        <div class="p-val" id="levelsVal">8</div>
      </div>
    </div>
    <div class="p-row">
      <div class="p-label">RES</div>
      <div class="p-slider-wrap">
        <input type="range" id="res" min="64" max="512" value="256" step="32">
        <div class="p-val" id="resVal">256</div>
      </div>
    </div>
    <div class="p-row">
      <div class="p-label">SMOOTH</div>
      <div class="p-slider-wrap">
        <input type="range" id="smooth" min="0" max="8" value="4" step="1">
        <div class="p-val" id="smoothVal">0</div>
      </div>
    </div>
    <div class="p-row">
      <div class="p-label">FX</div>
      <div class="fx-pills">
        <button class="fx-pill" id="solidToggle">SOLID</button>
        <button class="fx-pill" id="bandToggle">BAND</button>
        <button class="fx-pill" id="ghostToggle">GHOST</button>
        <button class="fx-pill" id="mirrorToggle">MIRROR</button>
        <button class="fx-pill" id="glitchToggle">GLITCH</button>
        <button class="fx-pill" id="pulseToggle">PULSE</button>
        <button class="fx-pill" id="warpToggle">WARP</button>
        <button class="fx-pill" id="sortToggle">SORT</button>
        <button class="fx-pill" id="feedbackToggle">FEEDBACK</button>
      </div>
    </div>
    <div class="p-row">
      <div class="p-label">COLOR</div>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
  </div>

  <!-- Credit modal -->
  <div id="credit-modal">
    <div id="credit-content">
      <div class="credit-row">
        <span class="credit-key">名称</span>
        <span class="credit-val">DESU&trade; edgecam</span>
      </div>
      <div class="credit-row">
        <span class="credit-key">支給元</span>
        <a href="https://warpshoot.github.io/desu/" target="_blank" class="credit-val">warpshoot.github.io/desu</a>
      </div>
      <div class="credit-row">
        <span class="credit-key">製造</span>
        <a href="https://warpshoot.github.io/" target="_blank" class="credit-val">wpy</a>
      </div>
      <hr class="credit-divider">
      <div class="credit-row">
        <span class="credit-key">説明書</span>
        <a href="MANUAL.md" target="_blank" class="credit-manual-link">人間向け</a>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div id="bottomBar">
    <div class="bb-side left">
      <button class="bb-btn" id="imgBtn">
        <!-- shown in cam/standby mode -->
        <svg id="imgIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21,15 16,10 5,21"/>
        </svg>
        <!-- shown in img mode -->
        <svg id="camIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span class="bb-lbl" id="imgBtnLbl">IMG</span>
      </button>
    </div>

    <button id="shutterBtn"></button>

    <div class="bb-side right">
      <button class="bb-btn" id="saveBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7,10 12,15 17,10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="bb-lbl">SAVE</span>
      </button>
      <button class="bb-btn" id="camSwitch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 0V3m0 5h5m-5 4a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16m0 0h-5m5 0v5"/>
        </svg>
        <span class="bb-lbl">FLIP</span>
      </button>
    </div>
  </div>

  <!-- Save Modal -->
  <div class="modal-overlay" id="saveModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">EXPORT</span>
        <button class="modal-close" id="modalClose">x</button>
      </div>
      <div class="modal-preview-wrap">
        <canvas id="modalPreview"></canvas>
      </div>
      <div class="modal-row">
        <div class="modal-label">SIZE</div>
        <div class="seg-group" id="sizeGroup">
          <button class="seg-btn" data-size="320">320</button>
          <button class="seg-btn active" data-size="640">640</button>
          <button class="seg-btn" data-size="1280">1280</button>
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-label">BG</div>
        <div class="seg-group" id="bgGroup">
          <button class="seg-btn active" data-bg="black">BLACK</button>
          <button class="seg-btn" data-bg="clear">CLEAR</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="modalCopyBtn">COPY</button>
        <button class="btn" id="modalSvgBtn">SVG</button>
        <button class="btn primary" id="modalSaveBtn">PNG</button>
      </div>
    </div>
  </div>

  <script>
    // === LINE COLORS ===
    const LINE_COLORS = {
      white:  { label: 'WHITE',  hex: '#cccccc', rgb: [204, 204, 204] },
      green:  { label: 'GREEN',  hex: '#7fff6a', rgb: [127, 255, 106] },
      amber:  { label: 'AMBER',  hex: '#ffb300', rgb: [255, 179,   0] },
      cyan:   { label: 'CYAN',   hex: '#00e5ff', rgb: [  0, 229, 255] },
      blue:   { label: 'BLUE',   hex: '#6699ff', rgb: [102, 153, 255] },
      red:    { label: 'RED',    hex: '#ff4444', rgb: [255,  68,  68] },
      pink:   { label: 'PINK',   hex: '#ff88cc', rgb: [255, 136, 204] },
    };

    // === STORAGE ===
    const STORAGE_KEYS = { levels: 'ecLevels', res: 'ecRes', smooth: 'ecSmooth', color: 'ecColor' };
    const DEFAULTS     = { levels: 8, res: 256, smooth: 4, color: 'white' };

    function loadSetting(key, parse) {
      const v = localStorage.getItem(STORAGE_KEYS[key]);
      return v !== null ? parse(v) : DEFAULTS[key];
    }

    // === STATE ===
    let currentLevels = loadSetting('levels', parseInt);
    let currentRes    = loadSetting('res',    parseInt);
    let currentColor  = loadSetting('color',  String);
    let currentSmooth = loadSetting('smooth', parseInt);
    let mode       = null;   // 'cam' | 'img'
    let frozen     = false;
    let frozenFrame = null;
    let facingMode = 'environment';
    let stream     = null;
    let animFrameId = null;

    let loadedImage = null;
    let cropCenterX = 0.5, cropCenterY = 0.5, cropZoom = 1;

    let solidMode = false, bandMode = false, ghostMode = false, mirrorMode = false;
    let glitchMode = false, pulseMode = false, pulseAnimId = null;
    let warpMode = false, sortMode = false, feedbackMode = false;
    let feedbackCanvas = null, feedbackCtx = null;
    let ghostCanvas = null, ghostCtx = null;
    let ghostSnapshots = [], lastSnapshotTime = 0;

    const glitchState = { shift: 4, nextAt: 0 };
    const pulseState  = { level: 0.8, target: 0.8, nextAt: 0, speed: 0.06 };
    const GHOST_INTERVAL = 100, GHOST_DURATION = 500, GHOST_MAX_SNAPS = 5;

    // === DOM ===
    const contourCanvas = document.getElementById('contourCanvas');
    const ctx           = contourCanvas.getContext('2d');
    const sampleCanvas  = document.getElementById('sampleCanvas');
    const sampleCtx     = sampleCanvas.getContext('2d');
    const video         = document.getElementById('videoFeed');
    const statusEl      = document.getElementById('status');

    // === INIT CONTROLS ===
    (function syncInitialUI() {
      const levelsEl = document.getElementById('levels');
      levelsEl.value = currentLevels;
      document.getElementById('levelsVal').textContent = currentLevels;

      const resEl = document.getElementById('res');
      resEl.value = currentRes;
      document.getElementById('resVal').textContent = currentRes;

      const smoothEl = document.getElementById('smooth');
      smoothEl.value = currentSmooth;
      document.getElementById('smoothVal').textContent = currentSmooth;
    })();

    document.getElementById('levels').addEventListener('input', e => {
      currentLevels = parseInt(e.target.value);
      document.getElementById('levelsVal').textContent = currentLevels;
      localStorage.setItem(STORAGE_KEYS.levels, currentLevels);
    });

    document.getElementById('res').addEventListener('input', e => {
      currentRes = parseInt(e.target.value);
      document.getElementById('resVal').textContent = currentRes;
      localStorage.setItem(STORAGE_KEYS.res, currentRes);
    });

    document.getElementById('smooth').addEventListener('input', e => {
      currentSmooth = parseInt(e.target.value);
      document.getElementById('smoothVal').textContent = currentSmooth;
      localStorage.setItem(STORAGE_KEYS.smooth, currentSmooth);
    });

    // Color swatches
    const colorSwatchesEl = document.getElementById('colorSwatches');
    Object.entries(LINE_COLORS).forEach(([key, c]) => {
      const label = document.createElement('label');
      label.className = 'swatch-label';
      label.title = c.label;
      const input = document.createElement('input');
      input.type = 'radio'; input.name = 'linecolor'; input.value = key;
      input.className = 'swatch-input';
      if (key === currentColor) input.checked = true;
      input.addEventListener('change', e => {
        if (e.target.checked) {
          currentColor = e.target.value;
          localStorage.setItem(STORAGE_KEYS.color, currentColor);
          maybeRender();
        }
      });
      const display = document.createElement('div');
      display.className = 'swatch-display';
      display.style.backgroundColor = c.hex;
      label.appendChild(input); label.appendChild(display);
      colorSwatchesEl.appendChild(label);
    });

    // MULTI swatch
    (() => {
      const label = document.createElement('label');
      label.className = 'swatch-label'; label.title = 'MULTI';
      const input = document.createElement('input');
      input.type = 'radio'; input.name = 'linecolor'; input.value = 'multi';
      input.className = 'swatch-input';
      if (currentColor === 'multi') input.checked = true;
      input.addEventListener('change', e => {
        if (e.target.checked) {
          currentColor = 'multi';
          localStorage.setItem(STORAGE_KEYS.color, 'multi');
          maybeRender();
        }
      });
      const display = document.createElement('div');
      display.className = 'swatch-display';
      display.style.background = 'conic-gradient(red, yellow, lime, cyan, blue, magenta, red)';
      label.appendChild(input); label.appendChild(display);
      colorSwatchesEl.appendChild(label);
    })();

    // Credit modal
    document.getElementById('credit-btn').addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('credit-modal').classList.add('visible');
    });
    document.getElementById('credit-modal').addEventListener('click', e => {
      if (e.target.id === 'credit-modal')
        document.getElementById('credit-modal').classList.remove('visible');
    });

    // Settings panel toggle
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsBtn   = document.getElementById('settingsBtn');
    settingsBtn.addEventListener('click', () => {
      const open = settingsPanel.classList.toggle('open');
      settingsBtn.classList.toggle('active', open);
    });

    // Close settings on viewfinder tap
    document.getElementById('viewfinder').addEventListener('pointerdown', () => {
      if (settingsPanel.classList.contains('open')) {
        settingsPanel.classList.remove('open');
        settingsBtn.classList.remove('active');
      }
    });

    // === UI HELPERS ===
    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className   = cls || '';
    }

    function updateShutterVisual() {
      document.getElementById('shutterBtn').classList.toggle('frozen', mode === 'cam' && frozen);
    }

    function updateActionBtns() {
      const canSave = (mode === 'img') || (mode === 'cam' && frozen);
      document.getElementById('saveBtn').disabled = !canSave;
    }

    // === RENDERING ===
    function getSourceDimensions() {
      const v = document.getElementById('videoFeed');
      if (mode === 'cam' && v.videoWidth > 0) return { w: v.videoWidth, h: v.videoHeight };
      if (mode === 'img' && loadedImage) return { w: loadedImage.naturalWidth, h: loadedImage.naturalHeight };
      return { w: 640, h: 480 };
    }

    function boxBlur(grid, w, h, radius) {
      if (radius === 0) return grid;
      const tmp = new Float32Array(w * h);
      const out = new Float32Array(w * h);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let sum = 0, count = 0;
          for (let dx = -radius; dx <= radius; dx++) {
            const nx = x + dx;
            if (nx >= 0 && nx < w) { sum += grid[y * w + nx]; count++; }
          }
          tmp[y * w + x] = sum / count;
        }
      }
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let sum = 0, count = 0;
          for (let dy = -radius; dy <= radius; dy++) {
            const ny = y + dy;
            if (ny >= 0 && ny < h) { sum += tmp[ny * w + x]; count++; }
          }
          out[y * w + x] = sum / count;
        }
      }
      return out;
    }

    function hslToRgb(h, s, l) {
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs((h * 6) % 2 - 1));
      const m = l - c / 2;
      let r, g, b;
      const hi = Math.floor(h * 6) % 6;
      if      (hi === 0) { r = c; g = x; b = 0; }
      else if (hi === 1) { r = x; g = c; b = 0; }
      else if (hi === 2) { r = 0; g = c; b = x; }
      else if (hi === 3) { r = 0; g = x; b = c; }
      else if (hi === 4) { r = x; g = 0; b = c; }
      else               { r = c; g = 0; b = x; }
      return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
    }

    function applyGlitch(canvas) {
      const gc = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      const src = gc.getImageData(0, 0, w, h).data;
      const out = new Uint8ClampedArray(src.length);
      const t = Date.now();
      if (t >= glitchState.nextAt) {
        glitchState.shift = Math.floor(Math.random() * 3) + 1;
        glitchState.nextAt = t + Math.floor(Math.random() * 260) + 20;
      }
      const shift = glitchState.shift;
      const bands = [];
      if (Math.random() < 0.30) {
        const count = Math.floor(Math.random() * 3) + 1;
        for (let i = 0; i < count; i++) {
          bands.push({
            y: Math.floor(Math.random() * h),
            h: Math.floor(Math.random() * h * 0.05) + 1,
            dx: Math.floor((Math.random() - 0.5) * w * 0.02),
          });
        }
      }
      for (let y = 0; y < h; y++) {
        let bandDx = 0;
        for (const b of bands) { if (y >= b.y && y < b.y + b.h) { bandDx = b.dx; break; } }
        for (let x = 0; x < w; x++) {
          const oi = (y * w + x) * 4;
          const rx = Math.min(w - 1, Math.max(0, x - shift + bandDx));
          const gx = Math.min(w - 1, Math.max(0, x + bandDx));
          const bx = Math.min(w - 1, Math.max(0, x + shift + bandDx));
          out[oi]     = src[(y * w + rx) * 4];
          out[oi + 1] = src[(y * w + gx) * 4 + 1];
          out[oi + 2] = src[(y * w + bx) * 4 + 2];
          out[oi + 3] = 255;
        }
      }
      gc.putImageData(new ImageData(out, w, h), 0, 0);
    }

    function applySort(canvas) {
      const gc = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      const imgData = gc.getImageData(0, 0, w, h);
      const d = imgData.data;
      const THRESHOLD = 30;
      for (let x = 0; x < w; x++) {
        let y = 0;
        while (y < h) {
          const i0 = (y * w + x) * 4;
          const lum0 = 0.299*d[i0] + 0.587*d[i0+1] + 0.114*d[i0+2];
          if (lum0 <= THRESHOLD) { y++; continue; }
          const start = y;
          while (y < h) {
            const i = (y * w + x) * 4;
            const lum = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
            if (lum <= THRESHOLD) break;
            y++;
          }
          const end = y;
          const run = [];
          for (let r = start; r < end; r++) {
            const i = (r * w + x) * 4;
            run.push({ r: d[i], g: d[i+1], b: d[i+2], lum: 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2] });
          }
          run.sort((a, b) => b.lum - a.lum);
          for (let r = start; r < end; r++) {
            const i = (r * w + x) * 4;
            d[i] = run[r-start].r; d[i+1] = run[r-start].g;
            d[i+2] = run[r-start].b; d[i+3] = 255;
          }
        }
      }
      gc.putImageData(imgData, 0, 0);
    }

    function startPulseLoop() {
      if (pulseAnimId) return;
      function tick() {
        if (!pulseMode || (mode === 'cam' && !frozen)) { pulseAnimId = null; return; }
        renderSingle();
        pulseAnimId = requestAnimationFrame(tick);
      }
      pulseAnimId = requestAnimationFrame(tick);
    }

    function buildContourCanvas(pixelScale = 1, forceAspect = null) {
      const resVal = currentRes;
      const { w: srcW, h: srcH } = getSourceDimensions();
      const viewportAspect = forceAspect || (window.innerWidth / window.innerHeight);

      // Size processing grid to the target aspect ratio
      let w, h;
      if (viewportAspect >= 1) {
        w = Math.round(resVal * viewportAspect);
        h = resVal;
      } else {
        w = resVal;
        h = Math.round(resVal / viewportAspect);
      }

      sampleCanvas.width  = w;
      sampleCanvas.height = h;
      sampleCtx.save();
      sampleCtx.fillStyle = '#000';
      sampleCtx.fillRect(0, 0, w, h);

      if (mode === 'cam') {
        const src = (frozen && frozenFrame) ? frozenFrame : video;
        if (facingMode === 'user') { sampleCtx.translate(w, 0); sampleCtx.scale(-1, 1); }
        
        // Center-crop source (cover style)
        const srcAspect = srcW / srcH;
        let drawW, drawH, drawX, drawY;
        if (srcAspect > viewportAspect) {
          drawH = srcH;
          drawW = srcH * viewportAspect;
          drawX = (srcW - drawW) / 2;
          drawY = 0;
        } else {
          drawW = srcW;
          drawH = srcW / viewportAspect;
          drawX = 0;
          drawY = (srcH - drawH) / 2;
        }
        sampleCtx.drawImage(src, drawX, drawY, drawW, drawH, 0, 0, w, h);
      } else {
        // Image mode: respect current pan/zoom, but relative to viewport aspect
        const fitScale = Math.min(w / srcW, h / srcH);
        const viewToSrcWidth  = w / (cropZoom * fitScale);
        const viewToSrcHeight = h / (cropZoom * fitScale);
        const srcL = cropCenterX * srcW - viewToSrcWidth  / 2;
        const srcT = cropCenterY * srcH - viewToSrcHeight / 2;
        sampleCtx.drawImage(loadedImage, srcL, srcT, viewToSrcWidth, viewToSrcHeight, 0, 0, w, h);
      }
      sampleCtx.restore();

      if (feedbackMode && feedbackCanvas &&
          feedbackCanvas.width === w && feedbackCanvas.height === h) {
        sampleCtx.globalAlpha = 0.2;
        sampleCtx.drawImage(feedbackCanvas, 0, 0);
        sampleCtx.globalAlpha = 1;
      }

      if (sortMode) applySort(sampleCanvas);

      const imgData = sampleCtx.getImageData(0, 0, w, h).data;
      if (pulseMode) {
        const t = Date.now();
        if (t >= pulseState.nextAt || Math.abs(pulseState.level - pulseState.target) < 0.02) {
          pulseState.target = 0.2 + Math.random() * 0.8;
          pulseState.nextAt = t + Math.floor(Math.random() * 900) + 150;
          pulseState.speed  = 0.03 + Math.random() * 0.09;
        }
        pulseState.level += (pulseState.target - pulseState.level) * pulseState.speed;
      }
      const levels = pulseMode ? Math.max(2, Math.round(currentLevels * pulseState.level)) : currentLevels;
      const rawLum = new Float32Array(w * h);
      for (let i = 0; i < w * h; i++) {
        rawLum[i] = 0.299 * imgData[i*4] + 0.587 * imgData[i*4+1] + 0.114 * imgData[i*4+2];
      }
      const smoothed = boxBlur(rawLum, w, h, currentSmooth);
      const lumGrid = new Uint8Array(w * h);
      for (let i = 0; i < w * h; i++) {
        lumGrid[i] = Math.floor(smoothed[i] / 256 * levels);
      }

      if (warpMode) {
        const t = Date.now() * 0.001;
        const amp = resVal * 0.05;
        const warped = new Uint8Array(w * h);
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const wx = x + Math.sin(y / h * Math.PI * 5   + t * 0.9) * amp
                         + Math.sin(y / h * Math.PI * 1.7 + t * 0.3) * amp * 0.35;
            const wy = y + Math.sin(x / w * Math.PI * 4   + t * 0.7 + 1.5) * amp
                         + Math.sin(x / w * Math.PI * 0.9 + t * 0.2) * amp * 0.4;
            const sx = Math.round(Math.max(0, Math.min(w - 1, wx)));
            const sy = Math.round(Math.max(0, Math.min(h - 1, wy)));
            warped[y * w + x] = lumGrid[sy * w + sx];
          }
        }
        lumGrid.set(warped);
      }

      if (mirrorMode) {
        const halfW = Math.floor(w / 2);
        const halfH = Math.floor(h / 2);
        const mirrored = new Uint8Array(w * h);
        for (let y = 0; y < h; y++) {
          const sy = y < halfH ? y : h - 1 - y;
          for (let x = 0; x < w; x++) {
            const sx = x < halfW ? x : w - 1 - x;
            mirrored[y * w + x] = lumGrid[sy * w + sx];
          }
        }
        lumGrid.set(mirrored);
      }

      const outW = w * pixelScale, outH = h * pixelScale;
      const out = document.createElement('canvas');
      out.width = outW; out.height = outH;
      const oc = out.getContext('2d');

      const isMulti = currentColor === 'multi';
      const [lr, lg, lb] = isMulti ? [204, 204, 204] : LINE_COLORS[currentColor].rgb;
      const outImgData = oc.createImageData(outW, outH);
      const d = outImgData.data;
      const maxLevel = Math.max(1, levels - 1);

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const cur   = lumGrid[y * w + x];
          const right = x < w - 1 ? lumGrid[y * w + x + 1] : cur;
          const down  = y < h - 1 ? lumGrid[(y + 1) * w + x] : cur;
          const isEdge = (cur !== right || cur !== down);
          const isFill = (solidMode || (bandMode && cur % 2 === 0)) && !isEdge;
          if (!isFill && !isEdge) continue;
          const isDimFill = solidMode && isFill;
          let pr, pg, pb;
          if (isMulti) {
            const hue = cur / maxLevel * (300 / 360);
            [pr, pg, pb] = hslToRgb(hue, isDimFill ? 0.9 : 1.0, isDimFill ? 0.28 : 0.6);
          } else if (isDimFill) {
            const t = cur / maxLevel * 0.55;
            pr = Math.round(lr * t); pg = Math.round(lg * t); pb = Math.round(lb * t);
          } else {
            pr = lr; pg = lg; pb = lb;
          }
          for (let sy = 0; sy < pixelScale; sy++) {
            for (let sx = 0; sx < pixelScale; sx++) {
              const oi = ((y * pixelScale + sy) * outW + (x * pixelScale + sx)) * 4;
              d[oi] = pr; d[oi+1] = pg; d[oi+2] = pb; d[oi+3] = 255;
            }
          }
        }
      }
      oc.putImageData(outImgData, 0, 0);

      if (feedbackMode) {
        if (!feedbackCanvas || feedbackCanvas.width !== w || feedbackCanvas.height !== h) {
          feedbackCanvas = document.createElement('canvas');
          feedbackCanvas.width = w; feedbackCanvas.height = h;
          feedbackCtx = feedbackCanvas.getContext('2d');
        }
        feedbackCtx.clearRect(0, 0, w, h);
        feedbackCtx.drawImage(out, 0, 0, w, h);
      }
      return out;
    }

    function drawWithGhost(out) {
      const now = Date.now();
      const w = out.width, h = out.height;
      if (ghostSnapshots.length > 0 &&
          (ghostSnapshots[0].canvas.width !== w || ghostSnapshots[0].canvas.height !== h)) {
        ghostSnapshots = []; lastSnapshotTime = 0;
      }
      if (now - lastSnapshotTime >= GHOST_INTERVAL) {
        const snap = document.createElement('canvas');
        snap.width = w; snap.height = h;
        snap.getContext('2d').drawImage(out, 0, 0);
        ghostSnapshots.push({ canvas: snap, takenAt: now });
        lastSnapshotTime = now;
      }
      ghostSnapshots = ghostSnapshots.filter(s => now - s.takenAt < GHOST_DURATION);
      if (ghostSnapshots.length > GHOST_MAX_SNAPS) ghostSnapshots.shift();
      if (contourCanvas.width !== w) contourCanvas.width = w;
      if (contourCanvas.height !== h) contourCanvas.height = h;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      for (const snap of ghostSnapshots) {
        ctx.globalAlpha = 0.9;
        ctx.drawImage(snap.canvas, 0, 0, w, h);
      }
      ctx.globalAlpha = 1;
      ctx.drawImage(out, 0, 0, w, h);
    }

    function fitCanvasToViewport() {
      const cW = contourCanvas.width, cH = contourCanvas.height;
      if (!cW || !cH) return;
      const scale = Math.min(window.innerWidth / cW, window.innerHeight / cH);
      contourCanvas.style.width  = Math.round(cW * scale) + 'px';
      contourCanvas.style.height = Math.round(cH * scale) + 'px';
    }

    window.addEventListener('resize', fitCanvasToViewport);

    function renderFrame() {
      if (!mode || frozen) return;
      const out = buildContourCanvas();
      if (!out) { animFrameId = requestAnimationFrame(renderFrame); return; }
      if (glitchMode) applyGlitch(out);
      if (ghostMode) { drawWithGhost(out); } else {
        contourCanvas.width = out.width; contourCanvas.height = out.height;
        ctx.drawImage(out, 0, 0);
      }
      fitCanvasToViewport();
      if (mode === 'cam') animFrameId = requestAnimationFrame(renderFrame);
    }

    function renderSingle() {
      const out = buildContourCanvas();
      if (glitchMode) applyGlitch(out);
      ghostCanvas = null;
      contourCanvas.width = out.width; contourCanvas.height = out.height;
      ctx.drawImage(out, 0, 0);
      fitCanvasToViewport();
    }

    // === CAMERA ===
    async function startCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      try {
        setStatus('CONNECTING...');
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        mode = 'cam';
        frozen = false;
        frozenFrame = null;
        cropCenterX = 0.5; cropCenterY = 0.5; cropZoom = 1;
        document.getElementById('startOverlay').classList.add('hidden');
        setStatus('LIVE', 'live');
        updateShutterVisual();
        updateActionBtns();
        updateImgBtn();
        animFrameId = requestAnimationFrame(renderFrame);
      } catch (e) {
        setStatus('CAM ERR');
        console.error(e);
      }
    }

    // Shutter: start → freeze → resume
    document.getElementById('shutterBtn').addEventListener('click', () => {
      if (mode === null) { startCamera(); return; }

      if (mode === 'img') {
        mode = 'cam';
        frozen = false;
        setStatus(stream ? 'LIVE' : 'CONNECTING...', 'live');
        updateShutterVisual();
        updateActionBtns();
        if (stream) { animFrameId = requestAnimationFrame(renderFrame); }
        else { startCamera(); }
        return;
      }

      // mode === 'cam'
      frozen = !frozen;
      if (frozen) {
        frozenFrame = document.createElement('canvas');
        frozenFrame.width = video.videoWidth;
        frozenFrame.height = video.videoHeight;
        frozenFrame.getContext('2d').drawImage(video, 0, 0);
        cancelAnimationFrame(animFrameId);
        setStatus('FROZEN', 'frozen');
        if (pulseMode) startPulseLoop();
      } else {
        frozenFrame = null;
        setStatus('LIVE', 'live');
        animFrameId = requestAnimationFrame(renderFrame);
      }
      updateShutterVisual();
      updateActionBtns();
    });

    document.getElementById('camSwitch').addEventListener('click', () => {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      if (mode === 'cam') startCamera();
    });

    function updateImgBtn() {
      const isImg = mode === 'img';
      document.getElementById('imgIcon').style.display  = isImg ? 'none'  : '';
      document.getElementById('camIcon').style.display  = isImg ? ''      : 'none';
      document.getElementById('imgBtnLbl').textContent  = isImg ? 'CAM'   : 'IMG';
    }

    document.getElementById('imgBtn').addEventListener('click', () => {
      if (mode === 'img') {
        // Return to camera
        mode = 'cam';
        frozen = false;
        cancelAnimationFrame(animFrameId);
        setStatus(stream ? 'LIVE' : 'CONNECTING...', 'live');
        updateShutterVisual();
        updateActionBtns();
        updateImgBtn();
        if (stream) { animFrameId = requestAnimationFrame(renderFrame); }
        else { startCamera(); }
      } else {
        document.getElementById('fileInput').click();
      }
    });

    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        loadedImage = img;
        cropCenterX = 0.5; cropCenterY = 0.5; cropZoom = 1;
        mode = 'img';
        frozen = false;
        cancelAnimationFrame(animFrameId);
        document.getElementById('startOverlay').classList.add('hidden');
        setStatus('IMAGE', 'image');
        updateShutterVisual();
        updateActionBtns();
        updateImgBtn();
        if (pulseMode) { startPulseLoop(); } else { renderSingle(); }
        URL.revokeObjectURL(url);
      };
      img.src = url;
      e.target.value = '';
    });

    // === IMAGE GESTURES ===
    function panDelta(dxScreen, dyScreen, rect) {
      const { w: srcW, h: srcH } = getSourceDimensions();
      const viewfinder = document.getElementById('viewfinder');
      const vW = viewfinder.clientWidth || window.innerWidth;
      const vH = viewfinder.clientHeight || window.innerHeight;
      const viewportAspect = window.innerWidth / window.innerHeight;
      const resVal = currentRes;
      let w, h;
      if (viewportAspect >= 1) { w = Math.round(resVal * viewportAspect); h = resVal; }
      else { h = Math.round(resVal / viewportAspect); w = resVal; }

      const fitScale = Math.min(w / srcW, h / srcH);
      // Normalized movement across source pixels
      return {
        dx: (dxScreen / rect.width)  * (w / (srcW * cropZoom * fitScale)),
        dy: (dyScreen / rect.height) * (h / (srcH * cropZoom * fitScale)),
      };
    }

    function zoomAround(newZoom, nx, ny) {
      const oldZoom = cropZoom;
      cropZoom = Math.max(0.25, Math.min(12, newZoom));
      const zoomRatio = (1 / oldZoom - 1 / cropZoom);
      cropCenterX += (nx - 0.5) * zoomRatio;
      cropCenterY += (ny - 0.5) * zoomRatio;
    }

    const ptrs = new Map();
    let pinchStartDist = null, pinchStartZoom = 1;
    let lastDragX = 0, lastDragY = 0, lastTapTime = 0;

    contourCanvas.addEventListener('pointerdown', e => {
      if (!mode) return;
      e.preventDefault();
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size === 1) {
        lastDragX = e.clientX; lastDragY = e.clientY;
        const now = Date.now();
        if (now - lastTapTime < 300) { cropCenterX = 0.5; cropCenterY = 0.5; cropZoom = 1; maybeRender(); }
        lastTapTime = now;
      } else if (ptrs.size === 2) {
        const [a, b] = [...ptrs.values()];
        pinchStartDist = Math.hypot(b.x - a.x, b.y - a.y);
        pinchStartZoom = cropZoom;
      }
    }, { passive: false });

    contourCanvas.addEventListener('pointermove', e => {
      if (!mode || !ptrs.has(e.pointerId)) return;
      e.preventDefault();
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size === 1) {
        const rect = contourCanvas.getBoundingClientRect();
        const { dx, dy } = panDelta(e.clientX - lastDragX, e.clientY - lastDragY, rect);
        cropCenterX -= dx; cropCenterY -= dy;
        lastDragX = e.clientX; lastDragY = e.clientY;
        maybeRender();
      } else if (ptrs.size === 2) {
        const [a, b] = [...ptrs.values()];
        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const rect = contourCanvas.getBoundingClientRect();
        const nx = ((a.x + b.x) / 2 - rect.left) / rect.width;
        const ny = ((a.y + b.y) / 2 - rect.top) / rect.height;
        zoomAround(pinchStartZoom * dist / pinchStartDist, nx, ny);
        maybeRender();
      }
    }, { passive: false });

    const endPtr = e => { ptrs.delete(e.pointerId); if (ptrs.size < 2) pinchStartDist = null; };
    contourCanvas.addEventListener('pointerup',     endPtr);
    contourCanvas.addEventListener('pointercancel', endPtr);

    contourCanvas.addEventListener('wheel', e => {
      if (!mode) return;
      e.preventDefault();
      const rect = contourCanvas.getBoundingClientRect();
      zoomAround(cropZoom * (e.deltaY > 0 ? 0.9 : 1.1),
        (e.clientX - rect.left) / rect.width,
        (e.clientY - rect.top)  / rect.height);
      maybeRender();
    }, { passive: false });

    function maybeRender() {
      if (mode !== 'img' && !(mode === 'cam' && frozen)) return;
      if (pulseMode) { startPulseLoop(); } else { renderSingle(); }
    }

    ['levels', 'res', 'smooth'].forEach(id => {
      document.getElementById(id).addEventListener('input',  maybeRender);
      document.getElementById(id).addEventListener('change', maybeRender);
    });

    // === FX TOGGLES ===
    const TOGGLE_CONFLICTS = [
      ['solidToggle', 'bandToggle'],
      ['glitchToggle', 'ghostToggle'],
    ];

    function updateConflicts() {
      for (const [a, b] of TOGGLE_CONFLICTS) {
        const aOn = document.getElementById(a).classList.contains('on');
        const bOn = document.getElementById(b).classList.contains('on');
        document.getElementById(a).classList.toggle('disabled', bOn);
        document.getElementById(b).classList.toggle('disabled', aOn);
      }
    }

    function makeToggle(id, getter, setter, onChange) {
      const el = document.getElementById(id);
      if (getter()) el.classList.add('on');
      el.addEventListener('click', () => {
        if (el.classList.contains('disabled')) return;
        setter(!getter());
        el.classList.toggle('on', getter());
        updateConflicts();
        if (onChange) onChange();
      });
    }

    makeToggle('solidToggle',    () => solidMode,    v => { solidMode    = v; }, maybeRender);
    makeToggle('bandToggle',     () => bandMode,     v => { bandMode     = v; }, maybeRender);
    makeToggle('ghostToggle',    () => ghostMode,    v => { ghostMode = v; if (!v) { ghostSnapshots = []; lastSnapshotTime = 0; } });
    makeToggle('mirrorToggle',   () => mirrorMode,   v => { mirrorMode   = v; }, maybeRender);
    makeToggle('glitchToggle',   () => glitchMode,   v => { glitchMode   = v; }, maybeRender);
    makeToggle('pulseToggle',    () => pulseMode,    v => { pulseMode = v; if (v && (mode === 'img' || (mode === 'cam' && frozen))) startPulseLoop(); });
    makeToggle('warpToggle',     () => warpMode,     v => { warpMode     = v; }, maybeRender);
    makeToggle('sortToggle',     () => sortMode,     v => { sortMode     = v; }, maybeRender);
    makeToggle('feedbackToggle', () => feedbackMode, v => { feedbackMode = v; if (!v) { feedbackCanvas = null; feedbackCtx = null; } }, maybeRender);
    updateConflicts();

    // === SAVE MODAL ===
    let exportSize = 640;
    let exportTransparent = false;
    let cachedModalCanvas = null;

    function refreshModalPreview() {
      const preview = document.getElementById('modalPreview');
      preview.width  = cachedModalCanvas.width;
      preview.height = cachedModalCanvas.height;
      preview.getContext('2d').drawImage(cachedModalCanvas, 0, 0);
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      cachedModalCanvas = buildContourCanvas(1);
      refreshModalPreview();
      document.getElementById('saveModal').style.display = 'flex';
    });

    document.getElementById('modalClose').onclick = () => {
      document.getElementById('saveModal').style.display = 'none';
    };

    document.getElementById('saveModal').addEventListener('click', e => {
      if (e.target === document.getElementById('saveModal'))
        document.getElementById('saveModal').style.display = 'none';
    });

    document.querySelectorAll('#sizeGroup .seg-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        document.querySelectorAll('#sizeGroup .seg-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        exportSize = parseInt(this.dataset.size);
      });
    });

    document.querySelectorAll('#bgGroup .seg-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        document.querySelectorAll('#bgGroup .seg-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        exportTransparent = this.dataset.bg === 'clear';
      });
    });

    function getExportDimensions(srcW, srcH) {
      const aspect = srcW / srcH;
      let outW, outH;
      if (aspect >= 1) {
        outW = exportSize;
        outH = Math.round(exportSize / aspect);
      } else {
        outH = exportSize;
        outW = Math.round(exportSize * aspect);
      }
      return { outW, outH };
    }

    function buildExportCanvas() {
      const src = cachedModalCanvas;
      const { outW, outH } = getExportDimensions(src.width, src.height);
      const result = document.createElement('canvas');
      result.width = outW; result.height = outH;
      const rc = result.getContext('2d');
      rc.imageSmoothingEnabled = false;
      if (!exportTransparent) { rc.fillStyle = '#000'; rc.fillRect(0, 0, outW, outH); }
      rc.drawImage(src, 0, 0, outW, outH);
      return result;
    }

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                     (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    document.getElementById('modalSaveBtn').onclick = () => {
      const btn = document.getElementById('modalSaveBtn');
      const orig = btn.textContent;
      const fileName = `edgecam_${Date.now()}.png`;
      buildExportCanvas().toBlob(async (blob) => {
        if (isMobile && navigator.canShare) {
          const file = new File([blob], fileName, { type: 'image/png' });
          try {
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file] });
              btn.textContent = 'SAVED';
              setTimeout(() => { btn.textContent = orig; }, 1200);
              return;
            }
          } catch (e) { if (e.name === 'AbortError') return; }
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fileName; a.click();
        URL.revokeObjectURL(url);
        btn.textContent = 'SAVED';
        setTimeout(() => { btn.textContent = orig; }, 1200);
      }, 'image/png');
    };

    function buildSVG() {
      const src = cachedModalCanvas;
      const w = src.width, h = src.height;
      const { outW, outH } = getExportDimensions(w, h);
      const pixels = src.getContext('2d').getImageData(0, 0, w, h).data;
      const rects = [];
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          if (pixels[i + 3] === 0) continue;
          const hex = '#' + [pixels[i], pixels[i+1], pixels[i+2]]
            .map(v => v.toString(16).padStart(2, '0')).join('');
          rects.push(`<rect x="${x}" y="${y}" width="1" height="1" fill="${hex}"/>`);
        }
      }
      const bg = exportTransparent ? '' : `<rect width="${w}" height="${h}" fill="#000000"/>\n  `;
      return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${outW}" height="${outH}" shape-rendering="crispEdges">
  ${bg}${rects.join('\n  ')}
</svg>`;
    }

    document.getElementById('modalSvgBtn').onclick = async () => {
      const btn = document.getElementById('modalSvgBtn');
      const orig = btn.textContent;
      const fileName = `edgecam_${Date.now()}.svg`;
      const blob = new Blob([buildSVG()], { type: 'image/svg+xml' });
      if (isMobile && navigator.canShare) {
        const file = new File([blob], fileName, { type: 'image/svg+xml' });
        try {
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file] });
            btn.textContent = 'SAVED';
            setTimeout(() => { btn.textContent = orig; }, 1200);
            return;
          }
        } catch (e) { if (e.name === 'AbortError') return; }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName; a.click();
      URL.revokeObjectURL(url);
      btn.textContent = 'SAVED';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    };

    document.getElementById('modalCopyBtn').onclick = async () => {
      try {
        const exp = buildExportCanvas();
        exp.toBlob(async blob => {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        }, 'image/png');
      } catch (e) { console.error(e); }
    };

    window.addEventListener('load', () => {
      startCamera();
    });
  </script>
</body>
</html>
