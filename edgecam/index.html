<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DESU&trade; edgecam</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #ccc;
      --text-dim: #666;
      --accent: #7fff6a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100dvh;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      padding: 4px 0;
    }

    .status {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    /* Credit Button */
    #credit-btn {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: border-color 0.15s;
    }

    #credit-btn:hover {
      border-color: var(--accent);
    }

    /* Credit Panel */
    .credit-panel {
      position: fixed;
      top: max(52px, calc(env(safe-area-inset-top) + 40px));
      left: 12px;
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 11px;
      z-index: 200;
      min-width: 160px;
      display: none;
    }

    .credit-panel.open {
      display: block;
    }

    .credit-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }

    .credit-row:last-child {
      margin-bottom: 0;
    }

    .credit-key {
      color: var(--text-dim);
      min-width: 32px;
    }

    .credit-val {
      color: var(--text);
      text-decoration: none;
    }

    a.credit-val:hover {
      color: var(--accent);
    }

    /* Canvas */
    .canvas-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #contourCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    .start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .start-buttons {
      display: flex;
      gap: 12px;
    }

    .start-btn {
      padding: 10px 24px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .start-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .start-btn.secondary {
      color: var(--text-dim);
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--text);
      color: var(--text);
    }

    .btn.primary {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn.primary:hover:not(:disabled) {
      background: rgba(127, 255, 106, 0.08);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      min-width: 52px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .slider-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      padding: 12px 0;
      background-clip: content-box;
    }

    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    .slider-row input[type=range]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      border: none;
    }

    .slider-val {
      font-size: 11px;
      color: var(--text);
      min-width: 28px;
      text-align: right;
    }

    /* Bottom row */
    .bottom-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle {
      width: 26px;
      height: 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      position: relative;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .toggle.on {
      background: var(--accent);
      border-color: var(--accent);
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-dim);
      top: 1px;
      left: 1px;
      transition: transform 0.15s, background 0.15s;
    }

    .toggle.on::after {
      transform: translateX(12px);
      background: #000;
    }

    .toggle-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      cursor: pointer;
    }

    .spacer {
      flex: 1;
    }

    .cam-switch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: border-color 0.15s, color 0.15s;
    }

    .cam-switch svg {
      width: 14px;
      height: 14px;
    }

    .cam-switch:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* Color Swatch Radio Buttons */
    .color-swatches {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
      padding: 2px 0;
    }

    .swatch-label {
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .swatch-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .swatch-display {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background-clip: padding-box;
    }

    .swatch-input:checked + .swatch-display {
      border-color: var(--text);
      transform: scale(1.1);
    }

    .swatch-input:hover + .swatch-display {
      border-color: var(--text-dim);
    }

    .swatch-input:checked:hover + .swatch-display {
      border-color: var(--text);
    }

    .swatch-display::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bg);
      opacity: 0;
      transition: opacity 0.1s;
    }

    .swatch-input:checked + .swatch-display::after {
      opacity: 0.8;
    }

    .swatch-input:focus-visible + .swatch-display {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Segmented controls */
    .seg-group {
      display: flex;
      gap: 4px;
    }

    .seg-btn {
      padding: 5px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.12s;
    }

    .seg-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(127, 255, 106, 0.08);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      z-index: 300;
      padding: 16px 16px 0;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: var(--accent);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-preview-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #modalPreview {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .modal-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      min-width: 52px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-actions .btn {
      flex: 1;
      min-width: 70px;
    }

    body.x2 .app, body.x2 .modal {
      max-width: 840px;
    }
  </style>
</head>

<body>

  <button id="credit-btn" title="About">i</button>
  <div class="credit-panel" id="creditPanel">
    <div class="credit-row">
      <span class="credit-key">tool</span>
      <span class="credit-val">DESU&trade; edgecam</span>
    </div>
    <div class="credit-row">
      <span class="credit-key">ver</span>
      <span class="credit-val">1.1.0</span>
    </div>
    <div class="credit-row">
      <span class="credit-key">by</span>
      <a href="https://warpshoot.github.io/" target="_blank" class="credit-val">wpy</a>
    </div>
  </div>

  <div class="app">
    <div class="header">
      <button id="sizeToggle" style="background:transparent; border:1px solid var(--border); color:var(--text-dim); font-family:'DM Mono', monospace; font-size:11px; padding:2px 6px; border-radius:3px; cursor:pointer; margin-right:auto; letter-spacing:0.1em; transition:all 0.15s;" title="Toggle UI Size">x1</button>
      <div class="status" id="status">STANDBY</div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="contourCanvas" width="320" height="320" style="touch-action:none;"></canvas>
      <div class="start-screen" id="startScreen">
        <div class="start-buttons">
          <button class="start-btn" id="startBtn">CAM</button>
          <button class="start-btn secondary" id="loadImgBtn">IMG</button>
        </div>
      </div>
    </div>

    <video id="videoFeed" playsinline autoplay muted style="display:none;"></video>
    <canvas id="sampleCanvas" style="display:none;"></canvas>
    <input type="file" id="fileInput" accept="image/*" style="display:none;">

    <div class="actions">
      <button class="btn" id="freezeBtn">FREEZE</button>
      <button class="btn" id="loadAnotherBtn">LOAD IMG</button>
      <button class="btn" id="saveOpenBtn" disabled>SAVE</button>
    </div>

    <div class="controls">
      <!-- Levels -->
      <div class="control-row">
        <div class="control-label">LEVELS</div>
        <div class="slider-row">
          <input type="range" id="levels" min="2" max="24" value="8" step="1">
          <div class="slider-val" id="levelsVal">8</div>
        </div>
      </div>

      <!-- Resolution -->
      <div class="control-row">
        <div class="control-label">RES</div>
        <div class="slider-row">
          <input type="range" id="res" min="64" max="512" value="256" step="32">
          <div class="slider-val" id="resVal">256</div>
        </div>
      </div>

      <!-- Smooth -->
      <div class="control-row">
        <div class="control-label">SMOOTH</div>
        <div class="slider-row">
          <input type="range" id="smooth" min="0" max="8" value="4" step="1">
          <div class="slider-val" id="smoothVal">0</div>
        </div>
      </div>

      <!-- Line color -->
      <div class="control-row">
        <div class="control-label">COLOR</div>
        <div class="color-swatches" id="colorSwatches"></div>
      </div>

      <!-- Mode toggles -->
      <div class="control-row">
        <div class="control-label">MODE</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; flex:1; padding:2px 0;">
          <div class="toggle-row">
            <div class="toggle" id="solidToggle"></div>
            <span class="toggle-label" id="solidLabel">SOLID</span>
          </div>
          <div class="toggle-row">
            <div class="toggle" id="ghostToggle"></div>
            <span class="toggle-label" id="ghostLabel">GHOST</span>
          </div>
        </div>
      </div>

      <!-- Bottom row: cam switch -->
      <div class="bottom-row">
        <div class="spacer"></div>
        <button class="cam-switch" id="camSwitch" title="Switch camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 0V3m0 5h5m-5 4a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16m0 0h-5m5 0v5" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Save Modal -->
  <div class="modal-overlay" id="saveModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">EXPORT</span>
        <button class="modal-close" id="modalClose">x</button>
      </div>
      <div class="modal-preview-wrap">
        <canvas id="modalPreview"></canvas>
      </div>
      <div class="modal-row">
        <div class="modal-label">SIZE</div>
        <div class="seg-group" id="sizeGroup">
          <button class="seg-btn" data-size="320">320</button>
          <button class="seg-btn active" data-size="640">640</button>
          <button class="seg-btn" data-size="1280">1280</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="modalCopyBtn">COPY</button>
        <button class="btn" id="modalSvgBtn">SVG</button>
        <button class="btn primary" id="modalSaveBtn">PNG</button>
      </div>
    </div>
  </div>

  <script>
    // === LINE COLORS ===
    const LINE_COLORS = {
      white:  { label: 'WHITE',  hex: '#cccccc', rgb: [204, 204, 204] },
      green:  { label: 'GREEN',  hex: '#7fff6a', rgb: [127, 255, 106] },
      amber:  { label: 'AMBER',  hex: '#ffb300', rgb: [255, 179,   0] },
      cyan:   { label: 'CYAN',   hex: '#00e5ff', rgb: [  0, 229, 255] },
      blue:   { label: 'BLUE',   hex: '#6699ff', rgb: [102, 153, 255] },
      red:    { label: 'RED',    hex: '#ff4444', rgb: [255,  68,  68] },
      pink:   { label: 'PINK',   hex: '#ff88cc', rgb: [255, 136, 204] },
    };

    // === STORAGE ===
    const STORAGE_KEYS = { levels: 'ecLevels', res: 'ecRes', smooth: 'ecSmooth', color: 'ecColor' };
    const DEFAULTS = { levels: 8, res: 256, smooth: 4, color: 'white' };

    function loadSetting(key, parse) {
      const v = localStorage.getItem(STORAGE_KEYS[key]);
      return v !== null ? parse(v) : DEFAULTS[key];
    }

    // === STATE ===
    let currentLevels = loadSetting('levels', parseInt);
    let currentRes = loadSetting('res', parseInt);
    let currentColor = loadSetting('color', String);
    let currentSmooth = loadSetting('smooth', parseInt);
    let mode = null;       // 'cam' | 'img'
    let frozen = false;
    let frozenFrame = null;
    let facingMode = 'environment';
    let stream = null;
    let animFrameId = null;

    // Image mode state
    let loadedImage = null;
    let cropCenterX = 0.5;
    let cropCenterY = 0.5;
    let cropZoom = 1;

    // Feature toggles
    let solidMode = false;
    let ghostMode = false;

    // Ghost canvas (persistence-of-vision)
    let ghostCanvas = null;
    let ghostCtx = null;

    // === DOM ===
    const contourCanvas = document.getElementById('contourCanvas');
    const ctx = contourCanvas.getContext('2d');
    const sampleCanvas = document.getElementById('sampleCanvas');
    const sampleCtx = sampleCanvas.getContext('2d');
    const video = document.getElementById('videoFeed');
    const startScreen = document.getElementById('startScreen');
    const statusEl = document.getElementById('status');

    // === INIT CONTROLS ===
    // Sync slider positions and display values from state (localStorage or defaults)
    (function syncInitialUI() {
      const levelsEl = document.getElementById('levels');
      levelsEl.value = currentLevels;
      document.getElementById('levelsVal').textContent = currentLevels;

      const resEl = document.getElementById('res');
      resEl.value = currentRes;
      document.getElementById('resVal').textContent = currentRes;

      const smoothEl = document.getElementById('smooth');
      smoothEl.value = currentSmooth;
      document.getElementById('smoothVal').textContent = currentSmooth;
    })();

    document.getElementById('levels').addEventListener('input', e => {
      currentLevels = parseInt(e.target.value);
      document.getElementById('levelsVal').textContent = currentLevels;
      localStorage.setItem(STORAGE_KEYS.levels, currentLevels);
    });

    document.getElementById('res').addEventListener('input', e => {
      currentRes = parseInt(e.target.value);
      document.getElementById('resVal').textContent = currentRes;
      localStorage.setItem(STORAGE_KEYS.res, currentRes);
    });

    document.getElementById('smooth').addEventListener('input', e => {
      currentSmooth = parseInt(e.target.value);
      document.getElementById('smoothVal').textContent = currentSmooth;
      localStorage.setItem(STORAGE_KEYS.smooth, currentSmooth);
    });

    // Color swatches
    const colorSwatches = document.getElementById('colorSwatches');
    Object.entries(LINE_COLORS).forEach(([key, c]) => {
      const label = document.createElement('label');
      label.className = 'swatch-label';
      label.title = c.label;

      const input = document.createElement('input');
      input.type = 'radio';
      input.name = 'linecolor';
      input.value = key;
      input.className = 'swatch-input';
      if (key === currentColor) input.checked = true;

      input.addEventListener('change', e => {
        if (e.target.checked) {
          currentColor = e.target.value;
          localStorage.setItem(STORAGE_KEYS.color, currentColor);
          maybeRender();
        }
      });

      const display = document.createElement('div');
      display.className = 'swatch-display';
      display.style.backgroundColor = c.hex;

      label.appendChild(input);
      label.appendChild(display);
      colorSwatches.appendChild(label);
    });

    // MULTI swatch
    (() => {
      const label = document.createElement('label');
      label.className = 'swatch-label';
      label.title = 'MULTI';

      const input = document.createElement('input');
      input.type = 'radio';
      input.name = 'linecolor';
      input.value = 'multi';
      input.className = 'swatch-input';
      if (currentColor === 'multi') input.checked = true;

      input.addEventListener('change', e => {
        if (e.target.checked) {
          currentColor = 'multi';
          localStorage.setItem(STORAGE_KEYS.color, 'multi');
          maybeRender();
        }
      });

      const display = document.createElement('div');
      display.className = 'swatch-display';
      display.style.background = 'conic-gradient(red, yellow, lime, cyan, blue, magenta, red)';

      label.appendChild(input);
      label.appendChild(display);
      colorSwatches.appendChild(label);
    })();

    // Credit panel
    document.getElementById('credit-btn').addEventListener('click', () => {
      document.getElementById('creditPanel').classList.toggle('open');
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('#credit-btn') && !e.target.closest('#creditPanel')) {
        document.getElementById('creditPanel').classList.remove('open');
      }
    });

    // === BUTTON STATES ===
    function updateActionBtns() {
      document.getElementById('saveOpenBtn').disabled = (mode === null);
    }

    // UI Size Toggle
    document.getElementById('sizeToggle').addEventListener('click', function () {
      document.body.classList.toggle('x2');
      const isX2 = document.body.classList.contains('x2');
      this.textContent = isX2 ? 'x2' : 'x1';
      this.style.color = isX2 ? 'var(--accent)' : 'var(--text-dim)';
      this.style.borderColor = isX2 ? 'var(--accent)' : 'var(--border)';
      if (mode === 'img' || (mode === 'cam' && frozen)) renderSingle();
    });

    // === RENDERING ===
    function getSourceDimensions() {
      if (mode === 'cam') return { w: video.videoWidth || 1, h: video.videoHeight || 1 };
      if (mode === 'img') return { w: loadedImage.naturalWidth, h: loadedImage.naturalHeight };
      return { w: 1, h: 1 };
    }

    // Separable box blur on a Float32Array luminance grid
    function boxBlur(grid, w, h, radius) {
      if (radius === 0) return grid;
      const tmp = new Float32Array(w * h);
      const out = new Float32Array(w * h);
      // Horizontal pass
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let sum = 0, count = 0;
          for (let dx = -radius; dx <= radius; dx++) {
            const nx = x + dx;
            if (nx >= 0 && nx < w) { sum += grid[y * w + nx]; count++; }
          }
          tmp[y * w + x] = sum / count;
        }
      }
      // Vertical pass
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let sum = 0, count = 0;
          for (let dy = -radius; dy <= radius; dy++) {
            const ny = y + dy;
            if (ny >= 0 && ny < h) { sum += tmp[ny * w + x]; count++; }
          }
          out[y * w + x] = sum / count;
        }
      }
      return out;
    }

    function hslToRgb(h, s, l) {
      // h in [0,1], s in [0,1], l in [0,1]
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs((h * 6) % 2 - 1));
      const m = l - c / 2;
      let r, g, b;
      const hi = Math.floor(h * 6) % 6;
      if      (hi === 0) { r = c; g = x; b = 0; }
      else if (hi === 1) { r = x; g = c; b = 0; }
      else if (hi === 2) { r = 0; g = c; b = x; }
      else if (hi === 3) { r = 0; g = x; b = c; }
      else if (hi === 4) { r = x; g = 0; b = c; }
      else               { r = c; g = 0; b = x; }
      return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
    }

    function buildContourCanvas(pixelScale = 1) {
      const isX2 = document.body.classList.contains('x2');
      const res = currentRes * (isX2 ? 2 : 1);
      const { w: srcW, h: srcH } = getSourceDimensions();

      // --- Sample source into res×res ---
      sampleCanvas.width = res;
      sampleCanvas.height = res;
      sampleCtx.save();
      sampleCtx.fillStyle = '#000';
      sampleCtx.fillRect(0, 0, res, res);

      if (mode === 'cam') {
        const src = (frozen && frozenFrame) ? frozenFrame : video;
        const isFront = facingMode === 'user';
        if (isFront) {
          sampleCtx.translate(res, 0);
          sampleCtx.scale(-1, 1);
        }
        const srcSize = Math.min(srcW, srcH);
        const sx = (srcW - srcSize) / 2;
        const sy = (srcH - srcSize) / 2;
        sampleCtx.drawImage(src, sx, sy, srcSize, srcSize, 0, 0, res, res);
      } else {
        const srcSize = Math.min(srcW, srcH) / cropZoom;
        const scaleX = res / srcSize;
        const scaleY = res / srcSize;
        const srcL = cropCenterX * srcW - srcSize / 2;
        const srcT = cropCenterY * srcH - srcSize / 2;
        const cL = Math.max(0, srcL), cT = Math.max(0, srcT);
        const cR = Math.min(srcW, srcL + srcSize), cB = Math.min(srcH, srcT + srcSize);
        if (cR > cL && cB > cT) {
          sampleCtx.drawImage(loadedImage,
            cL, cT, cR - cL, cB - cT,
            (cL - srcL) * scaleX, (cT - srcT) * scaleY,
            (cR - cL) * scaleX, (cB - cT) * scaleY
          );
        }
      }
      sampleCtx.restore();

      // --- Compute luminance grid ---
      const imgData = sampleCtx.getImageData(0, 0, res, res).data;
      const levels = currentLevels;
      let rawLum = new Float32Array(res * res);
      for (let i = 0; i < res * res; i++) {
        const r = imgData[i * 4], g = imgData[i * 4 + 1], b = imgData[i * 4 + 2];
        rawLum[i] = 0.299 * r + 0.587 * g + 0.114 * b;
      }
      // Apply box blur to smooth luminance before quantization
      const smoothed = boxBlur(rawLum, res, res, currentSmooth);
      const lumGrid = new Uint8Array(res * res);
      for (let i = 0; i < res * res; i++) {
        lumGrid[i] = Math.floor(smoothed[i] / 256 * levels);
      }

      // --- Build output via ImageData (fast: single putImageData) ---
      const outW = res * pixelScale;
      const outH = res * pixelScale;
      const out = document.createElement('canvas');
      out.width = outW;
      out.height = outH;
      const oc = out.getContext('2d');

      const isMulti = currentColor === 'multi';
      const [lr, lg, lb] = isMulti ? [204, 204, 204] : LINE_COLORS[currentColor].rgb;
      const outImgData = oc.createImageData(outW, outH);
      const d = outImgData.data;
      const maxLevel = Math.max(1, levels - 1);

      for (let y = 0; y < res; y++) {
        for (let x = 0; x < res; x++) {
          const cur = lumGrid[y * res + x];
          const right = x < res - 1 ? lumGrid[y * res + x + 1] : cur;
          const down  = y < res - 1 ? lumGrid[(y + 1) * res + x] : cur;
          const isEdge = (cur !== right || cur !== down);

          if (!solidMode && !isEdge) continue;

          let pr, pg, pb;
          if (isMulti) {
            const hue = cur / maxLevel * (300 / 360);
            if (solidMode && !isEdge) {
              [pr, pg, pb] = hslToRgb(hue, 0.9, 0.28);
            } else {
              [pr, pg, pb] = hslToRgb(hue, 1.0, 0.6);
            }
          } else if (solidMode && !isEdge) {
            const t = cur / maxLevel * 0.55;
            pr = Math.round(lr * t);
            pg = Math.round(lg * t);
            pb = Math.round(lb * t);
          } else {
            pr = lr; pg = lg; pb = lb;
          }

          for (let sy = 0; sy < pixelScale; sy++) {
            for (let sx = 0; sx < pixelScale; sx++) {
              const oi = ((y * pixelScale + sy) * outW + (x * pixelScale + sx)) * 4;
              d[oi]     = pr;
              d[oi + 1] = pg;
              d[oi + 2] = pb;
              d[oi + 3] = 255;
            }
          }
        }
      }

      oc.putImageData(outImgData, 0, 0);
      return out;
    }

    function drawWithGhost(out) {
      const w = out.width, h = out.height;

      // Init or reset ghost canvas on size change
      if (!ghostCanvas || ghostCanvas.width !== w || ghostCanvas.height !== h) {
        ghostCanvas = document.createElement('canvas');
        ghostCanvas.width = w;
        ghostCanvas.height = h;
        ghostCtx = ghostCanvas.getContext('2d');
        ghostCtx.fillStyle = '#000';
        ghostCtx.fillRect(0, 0, w, h);
      }

      // Fade existing content toward black (persistence-of-vision)
      ghostCtx.fillStyle = 'rgba(0,0,0,0.06)';
      ghostCtx.fillRect(0, 0, w, h);

      // Draw new frame's edges (transparent bg, colored edges)
      ghostCtx.drawImage(out, 0, 0);

      // Render ghost canvas to contourCanvas
      if (contourCanvas.width !== w) contourCanvas.width = w;
      if (contourCanvas.height !== h) contourCanvas.height = h;
      ctx.drawImage(ghostCanvas, 0, 0);
    }

    function renderFrame() {
      if (!mode) return;
      if (frozen) return;

      const out = buildContourCanvas();
      if (ghostMode) {
        drawWithGhost(out);
      } else {
        contourCanvas.width = out.width;
        contourCanvas.height = out.height;
        ctx.drawImage(out, 0, 0);
      }

      if (mode === 'cam') animFrameId = requestAnimationFrame(renderFrame);
    }

    function renderSingle() {
      const out = buildContourCanvas();
      ghostCanvas = null;
      contourCanvas.width = out.width;
      contourCanvas.height = out.height;
      ctx.drawImage(out, 0, 0);
    }

    // === CAMERA ===
    async function startCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      try {
        statusEl.textContent = 'CONNECTING...';
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1280 }, height: { ideal: 1280 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        mode = 'cam';
        frozen = false;
        frozenFrame = null;
        startScreen.style.display = 'none';
        statusEl.textContent = 'LIVE';
        document.getElementById('freezeBtn').textContent = 'FREEZE';
        updateActionBtns();
        animFrameId = requestAnimationFrame(renderFrame);
      } catch (e) {
        statusEl.textContent = 'CAM ERROR';
        console.error(e);
      }
    }

    document.getElementById('startBtn').onclick = startCamera;

    document.getElementById('camSwitch').onclick = () => {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      if (mode === 'cam') startCamera();
    };

    document.getElementById('freezeBtn').onclick = () => {
      if (mode === 'img') {
        mode = 'cam';
        frozen = false;
        startScreen.style.display = 'none';
        statusEl.textContent = 'LIVE';
        document.getElementById('freezeBtn').textContent = 'FREEZE';
        updateActionBtns();
        if (stream) {
          animFrameId = requestAnimationFrame(renderFrame);
        } else {
          startCamera();
        }
        return;
      }
      frozen = !frozen;
      if (frozen) {
        frozenFrame = document.createElement('canvas');
        frozenFrame.width = video.videoWidth;
        frozenFrame.height = video.videoHeight;
        frozenFrame.getContext('2d').drawImage(video, 0, 0);
        cancelAnimationFrame(animFrameId);
        statusEl.textContent = 'FROZEN';
        document.getElementById('freezeBtn').textContent = 'RESUME';
      } else {
        frozenFrame = null;
        statusEl.textContent = 'LIVE';
        document.getElementById('freezeBtn').textContent = 'FREEZE';
        animFrameId = requestAnimationFrame(renderFrame);
      }
      updateActionBtns();
    };

    // === IMAGE LOADING ===
    function openFilePicker() {
      document.getElementById('fileInput').click();
    }

    document.getElementById('loadImgBtn').onclick = openFilePicker;
    document.getElementById('loadAnotherBtn').onclick = openFilePicker;

    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        loadedImage = img;
        cropCenterX = 0.5;
        cropCenterY = 0.5;
        cropZoom = 1;
        mode = 'img';
        frozen = false;
        cancelAnimationFrame(animFrameId);
        startScreen.style.display = 'none';
        statusEl.textContent = 'IMAGE';
        document.getElementById('freezeBtn').textContent = 'CAM';
        updateActionBtns();
        renderSingle();
        URL.revokeObjectURL(url);
      };
      img.src = url;
      e.target.value = '';
    });

    // === IMAGE GESTURES ===
    function panDelta(dxScreen, dyScreen, rect) {
      const { w: srcW, h: srcH } = getSourceDimensions();
      const srcMin = Math.min(srcW, srcH);
      return {
        dx: dxScreen / rect.width / cropZoom * srcMin / srcW,
        dy: dyScreen / rect.height / cropZoom * srcMin / srcH,
      };
    }

    function zoomAround(newZoom, nx, ny) {
      const { w: srcW, h: srcH } = getSourceDimensions();
      const srcMin = Math.min(srcW, srcH);
      const oldSrcSize = srcMin / cropZoom;
      const imgX = cropCenterX * srcW + (nx - 0.5) * oldSrcSize;
      const imgY = cropCenterY * srcH + (ny - 0.5) * oldSrcSize;
      cropZoom = Math.max(0.25, Math.min(8, newZoom));
      const newSrcSize = srcMin / cropZoom;
      cropCenterX = (imgX - (nx - 0.5) * newSrcSize) / srcW;
      cropCenterY = (imgY - (ny - 0.5) * newSrcSize) / srcH;
    }

    const ptrs = new Map();
    let pinchStartDist = null, pinchStartZoom = 1;
    let lastDragX = 0, lastDragY = 0;
    let lastTapTime = 0;

    contourCanvas.addEventListener('pointerdown', e => {
      if (mode !== 'img') return;
      e.preventDefault();
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size === 1) {
        lastDragX = e.clientX; lastDragY = e.clientY;
        const now = Date.now();
        if (now - lastTapTime < 300) {
          cropCenterX = 0.5; cropCenterY = 0.5; cropZoom = 1;
          renderSingle();
        }
        lastTapTime = now;
      } else if (ptrs.size === 2) {
        const [a, b] = [...ptrs.values()];
        pinchStartDist = Math.hypot(b.x - a.x, b.y - a.y);
        pinchStartZoom = cropZoom;
      }
    }, { passive: false });

    contourCanvas.addEventListener('pointermove', e => {
      if (mode !== 'img' || !ptrs.has(e.pointerId)) return;
      e.preventDefault();
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (ptrs.size === 1) {
        const rect = contourCanvas.getBoundingClientRect();
        const { dx, dy } = panDelta(e.clientX - lastDragX, e.clientY - lastDragY, rect);
        cropCenterX -= dx;
        cropCenterY -= dy;
        lastDragX = e.clientX; lastDragY = e.clientY;
        renderSingle();
      } else if (ptrs.size === 2) {
        const [a, b] = [...ptrs.values()];
        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        const rect = contourCanvas.getBoundingClientRect();
        const nx = ((a.x + b.x) / 2 - rect.left) / rect.width;
        const ny = ((a.y + b.y) / 2 - rect.top) / rect.height;
        zoomAround(pinchStartZoom * dist / pinchStartDist, nx, ny);
        renderSingle();
      }
    }, { passive: false });

    const endPtr = e => { ptrs.delete(e.pointerId); if (ptrs.size < 2) pinchStartDist = null; };
    contourCanvas.addEventListener('pointerup', endPtr);
    contourCanvas.addEventListener('pointercancel', endPtr);

    contourCanvas.addEventListener('wheel', e => {
      if (mode !== 'img') return;
      e.preventDefault();
      const rect = contourCanvas.getBoundingClientRect();
      const nx = (e.clientX - rect.left) / rect.width;
      const ny = (e.clientY - rect.top) / rect.height;
      zoomAround(cropZoom * (e.deltaY > 0 ? 0.9 : 1.1), nx, ny);
      renderSingle();
    }, { passive: false });

    // Re-render on control change (image mode or frozen cam)
    function maybeRender() {
      if (mode === 'img' || (mode === 'cam' && frozen)) renderSingle();
    }

    ['levels', 'res', 'smooth'].forEach(id => {
      document.getElementById(id).addEventListener('input', maybeRender);
      document.getElementById(id).addEventListener('change', maybeRender);
    });

    // === MODE TOGGLES ===
    function makeToggle(id, getter, setter, onChange) {
      const el = document.getElementById(id);
      if (getter()) el.classList.add('on');
      el.addEventListener('click', () => {
        setter(!getter());
        el.classList.toggle('on', getter());
        if (onChange) onChange();
      });
    }
    makeToggle('solidToggle', () => solidMode, v => { solidMode = v; }, maybeRender);
    makeToggle('ghostToggle', () => ghostMode, v => {
      ghostMode = v;
      if (!v) { ghostCanvas = null; ghostCtx = null; }
    });

    // === SAVE MODAL ===
    let exportSize = 640;
    let cachedModalCanvas = null;

    function refreshModalPreview() {
      const preview = document.getElementById('modalPreview');
      preview.width = cachedModalCanvas.width;
      preview.height = cachedModalCanvas.height;
      preview.getContext('2d').drawImage(cachedModalCanvas, 0, 0);
    }

    document.getElementById('saveOpenBtn').onclick = () => {
      cachedModalCanvas = buildContourCanvas(1);
      refreshModalPreview();
      document.getElementById('saveModal').style.display = 'flex';
    };

    document.getElementById('modalClose').onclick = () => {
      document.getElementById('saveModal').style.display = 'none';
    };

    document.getElementById('saveModal').addEventListener('click', e => {
      if (e.target === document.getElementById('saveModal'))
        document.getElementById('saveModal').style.display = 'none';
    });

    document.querySelectorAll('#sizeGroup .seg-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        document.querySelectorAll('#sizeGroup .seg-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        exportSize = parseInt(this.dataset.size);
      });
    });

    function buildExportCanvas() {
      const src = cachedModalCanvas;
      const result = document.createElement('canvas');
      result.width = exportSize;
      result.height = exportSize;
      const rc = result.getContext('2d');
      rc.imageSmoothingEnabled = false;
      rc.drawImage(src, 0, 0, exportSize, exportSize);
      return result;
    }

    document.getElementById('modalSaveBtn').onclick = () => {
      const exp = buildExportCanvas();
      exp.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `edgecam_${Date.now()}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/png');
    };

    function buildSVG() {
      // Run same sampling/quantization logic as buildContourCanvas
      const isX2 = document.body.classList.contains('x2');
      const res = currentRes * (isX2 ? 2 : 1);
      const { w: srcW, h: srcH } = getSourceDimensions();

      sampleCanvas.width = res;
      sampleCanvas.height = res;
      sampleCtx.save();
      sampleCtx.fillStyle = '#000';
      sampleCtx.fillRect(0, 0, res, res);

      if (mode === 'cam') {
        const src = (frozen && frozenFrame) ? frozenFrame : video;
        const isFront = facingMode === 'user';
        if (isFront) { sampleCtx.translate(res, 0); sampleCtx.scale(-1, 1); }
        const srcSize = Math.min(srcW, srcH);
        const sx = (srcW - srcSize) / 2, sy = (srcH - srcSize) / 2;
        sampleCtx.drawImage(src, sx, sy, srcSize, srcSize, 0, 0, res, res);
      } else {
        const srcSize = Math.min(srcW, srcH) / cropZoom;
        const scaleX = res / srcSize, scaleY = res / srcSize;
        const srcL = cropCenterX * srcW - srcSize / 2;
        const srcT = cropCenterY * srcH - srcSize / 2;
        const cL = Math.max(0, srcL), cT = Math.max(0, srcT);
        const cR = Math.min(srcW, srcL + srcSize), cB = Math.min(srcH, srcT + srcSize);
        if (cR > cL && cB > cT) {
          sampleCtx.drawImage(loadedImage,
            cL, cT, cR - cL, cB - cT,
            (cL - srcL) * scaleX, (cT - srcT) * scaleY,
            (cR - cL) * scaleX, (cB - cT) * scaleY
          );
        }
      }
      sampleCtx.restore();

      const imgData = sampleCtx.getImageData(0, 0, res, res).data;
      let rawLum = new Float32Array(res * res);
      for (let i = 0; i < res * res; i++) {
        const r = imgData[i * 4], g = imgData[i * 4 + 1], b = imgData[i * 4 + 2];
        rawLum[i] = 0.299 * r + 0.587 * g + 0.114 * b;
      }
      const smoothed = boxBlur(rawLum, res, res, currentSmooth);
      const lumGrid = new Uint8Array(res * res);
      for (let i = 0; i < res * res; i++) {
        lumGrid[i] = Math.floor(smoothed[i] / 256 * currentLevels);
      }

      const isMulti = currentColor === 'multi';
      const [lr, lg, lb] = isMulti ? [204, 204, 204] : LINE_COLORS[currentColor].rgb;
      const maxLevel = Math.max(1, currentLevels - 1);
      const rects = [];
      for (let y = 0; y < res; y++) {
        for (let x = 0; x < res; x++) {
          const cur = lumGrid[y * res + x];
          const right = x < res - 1 ? lumGrid[y * res + x + 1] : cur;
          const down  = y < res - 1 ? lumGrid[(y + 1) * res + x] : cur;
          const isEdge = (cur !== right || cur !== down);
          if (!solidMode && !isEdge) continue;

          let pr, pg, pb;
          if (isMulti) {
            const hue = cur / maxLevel * (300 / 360);
            if (solidMode && !isEdge) {
              [pr, pg, pb] = hslToRgb(hue, 0.9, 0.28);
            } else {
              [pr, pg, pb] = hslToRgb(hue, 1.0, 0.6);
            }
          } else if (solidMode && !isEdge) {
            const t = cur / maxLevel * 0.55;
            pr = Math.round(lr * t); pg = Math.round(lg * t); pb = Math.round(lb * t);
          } else {
            pr = lr; pg = lg; pb = lb;
          }
          const hex = '#' + [pr, pg, pb].map(v => v.toString(16).padStart(2, '0')).join('');
          rects.push(`<rect x="${x}" y="${y}" width="1" height="1" fill="${hex}"/>`);
        }
      }

      return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${res} ${res}" width="${res}" height="${res}" shape-rendering="crispEdges">
  <rect width="${res}" height="${res}" fill="#000000"/>
  ${rects.join('\n  ')}
</svg>`;
    }

    document.getElementById('modalSvgBtn').onclick = () => {
      const svg = buildSVG();
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `edgecam_${Date.now()}.svg`;
      a.click();
      URL.revokeObjectURL(a.href);
    };

    document.getElementById('modalCopyBtn').onclick = async () => {
      try {
        const exp = buildExportCanvas();
        exp.toBlob(async blob => {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        }, 'image/png');
      } catch (e) {
        console.error(e);
      }
    };
  </script>
</body>

</html>
