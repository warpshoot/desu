<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DESU™︎ ep. ガラ</title>
    <link rel="stylesheet" href="style.css">
    <script src="/desu/favicon.js"></script>
</head>

<body>
    <div id="app-container">
        <!-- タイトル画面 -->
        <div class="title-screen" id="titleScreen">
            <div class="title-text">DESU™︎<br>ep. ガラ</div>
        </div>

        <!-- 背景画像 -->
        <img class="background" id="backgroundImage" src="" alt="背景">

        <!-- フェード用オーバーレイ -->
        <div class="fade-overlay" id="fadeOverlay"></div>

        <!-- テキストウィンドウ -->
        <div class="text-window" id="textWindow">
            <img class="face-icon" id="faceIcon" src="" alt="キャラクター">
            <div class="text-area">
                <div class="name-display" id="nameDisplay"></div>
                <div class="text-content" id="textContent"></div>
            </div>
            <div class="continue-icon" id="continueIcon">▼</div>
        </div>

        <!-- クローズボタン（常時表示） -->
        <span class="close-btn" id="closeBtnTop">×</span>

        <!-- エンド画面 -->
        <div class="replay-screen" id="replayScreen">
            <span class="replay-button" id="replayButton">もう一度見る</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
