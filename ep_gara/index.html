<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DESU™ ep. ガラ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #08080b; --text: #cac6be; --dim: #42403c; --mid: #7a7870;
  --accent: #a88858;
  --mono: 'Space Mono', monospace;
  --jp: 'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
}
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); overflow:hidden; cursor:pointer; user-select:none; }
body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px); pointer-events:none; z-index:9000; }

#bg { position:fixed; inset:0; background-size:cover; background-position:center; background-color:var(--bg); filter:brightness(0.45) saturate(0.6); transition:filter 0.3s; z-index:0; }
#vignette { position:fixed; inset:0; background:radial-gradient(ellipse 80% 90% at 50% 50%,transparent 20%,rgba(8,8,11,0.7) 100%); z-index:1; pointer-events:none; }
#fadeOverlay { position:fixed; inset:0; background:#08080b; z-index:8000; opacity:1; transition:opacity 1.5s ease; pointer-events:none; }
#fadeOverlay.out { opacity:0; } #fadeOverlay.in { opacity:1; }

/* HUD */
.hud { position:fixed; font-family:var(--mono); font-size:9px; letter-spacing:0.2em; color:var(--dim); z-index:12000; }
#hud-tl { top:26px; left:28px; display:flex; align-items:center; gap:12px; }
#hud-tr { top:26px; right:28px; display:flex; align-items:center; gap:14px; }
.logo { font-weight:700; font-size:11px; letter-spacing:0.22em; color:var(--text); text-decoration:none; }
.ep-label { font-size:9px; color:var(--dim); letter-spacing:0.18em; }
.pulse { width:4px; height:4px; border-radius:50%; background:var(--accent); animation:blink 3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
#closeBtn { font-family:var(--mono); font-size:11px; color:var(--dim); cursor:pointer; transition:color 0.2s; background:none; border:none; letter-spacing:0.2em; }
#closeBtn:hover { color:var(--text); }
#muteBtn { background:none; border:none; cursor:pointer; color:var(--dim); transition:color 0.2s; display:flex; align-items:center; }
#muteBtn:hover { color:var(--mid); }
#muteBtn svg { width:14px; height:14px; fill:currentColor; }

/* TITLE */
#titleScreen { position:fixed; inset:0; z-index:5000; background:var(--bg); display:flex; flex-direction:column; justify-content:flex-end; opacity:1; transition:opacity 0.8s ease; }
#titleScreen.hidden { opacity:0; pointer-events:none; }
.title-ep { font-family:var(--mono); font-size:9px; letter-spacing:0.3em; color:var(--dim); padding:0 28px 8px; }
.title-name { font-family:var(--jp); font-size:28px; font-weight:300; letter-spacing:0.15em; color:var(--text); padding:0 28px; }
.start-bar { border-top:1px solid rgba(255,255,255,0.07); background:rgba(8,8,11,0.9); padding:20px 28px; display:flex; align-items:center; gap:14px; margin-top:32px; transition:all 0.2s; }
.start-bar:hover { background:rgba(168,136,88,0.08); }
.start-bar-label { font-family:var(--jp); font-size:14px; color:rgba(202,198,190,0.55); letter-spacing:0.2em; transition:color 0.2s; }
.start-bar-caret { font-size:8px; color:var(--accent); opacity:0.7; animation:bob 2s ease-in-out infinite; }
#titleScreen:hover .start-bar-label { color:var(--text); }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(4px)} }

/* TEXT WINDOW — top, VN style */
#textWindow { position:fixed; top:0; left:0; right:0; z-index:10000; border-bottom:1px solid rgba(255,255,255,0.07); background:rgba(8,8,11,0.94); backdrop-filter:blur(10px); display:flex; align-items:flex-start; gap:18px; padding:72px 32px 22px; min-height:100px; opacity:0; pointer-events:none; transform:translateY(-8px); transition:opacity 0.3s ease,transform 0.3s ease; }
#textWindow.active { opacity:1; pointer-events:all; transform:translateY(0); }
#faceIcon { width:52px; height:52px; object-fit:cover; border:1px solid rgba(255,255,255,0.08); flex-shrink:0; filter:grayscale(15%); }
.text-body { flex:1; display:flex; flex-direction:column; gap:4px; }
#nameDisplay { font-family:var(--mono); font-size:9px; letter-spacing:0.25em; }
#nameDisplay.shi { color:var(--accent); }
#nameDisplay.desu { color:#8aaccc; }
#nameDisplay.sakana { color:#8acc9a; }
#textContent { font-family:var(--jp); font-size:14px; line-height:1.9; color:var(--text); letter-spacing:0.04em; min-height:1.9em; }
#continueIcon { font-size:9px; color:var(--accent); align-self:flex-end; margin-left:12px; flex-shrink:0; opacity:0; transition:opacity 0.3s; animation:blink 1.2s ease-in-out infinite; }
#continueIcon.show { opacity:1; }

/* BOTTOM NAV — HUD bottom-left */
#hud-bl { bottom:26px; left:28px; }
.back-label { font-family:var(--mono); font-size:11px; letter-spacing:0.18em; color:var(--dim); transition:color 0.2s; }
#bottomNav { opacity:0; pointer-events:none; transition:all 0.5s ease; cursor:pointer; padding:20px 28px; background:rgba(8,8,11,0.9); border:1px solid rgba(255,255,255,0.07); margin:-20px -28px; }
#bottomNav:hover { background:rgba(168,136,88,0.08); }
#bottomNav:hover .back-label { color:var(--text); }
#bottomNav.show { opacity:1; pointer-events:all; }
.back-label:hover { color:var(--mid); }

/* END SCREEN */
#endScreen { position:fixed; inset:0; z-index:6000; display:flex; flex-direction:column; justify-content:flex-end; opacity:0; pointer-events:none; transition:opacity 0.8s ease; }
#endScreen.show { opacity:1; pointer-events:all; }
.end-panel { border-top:1px solid rgba(255,255,255,0.07); background:rgba(8,8,11,0.9); }
.end-btn { display:flex; align-items:center; gap:14px; padding:16px 28px; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:background 0.15s; }
.end-btn:hover { background:rgba(168,136,88,0.07); }
.end-btn:hover .end-label { color:var(--text); }
.end-label { font-family:var(--jp); font-size:13px; color:rgba(202,198,190,0.55); letter-spacing:0.15em; transition:color 0.2s; }
.end-en { font-family:var(--mono); font-size:8px; color:var(--dim); letter-spacing:0.15em; margin-left:auto; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="vignette"></div>
<div id="fadeOverlay"></div>

<div class="hud" id="hud-tl">
  <a href="../index.html" class="logo" id="logoLink">DESU™</a>
  <span class="pulse"></span>
  <span class="ep-label">ep. ガラ</span>
</div>
<div class="hud" id="hud-tr">
  <button id="muteBtn">
    <svg id="muteIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <svg id="unmuteIcon" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  </button>
  <button id="closeBtn" onclick="goBack()">× 戻る</button>
</div>

<div id="titleScreen">
  <div class="title-ep">DESU™ — RECORDS</div>
  <div class="title-name">ep. ガラ</div>
  <div class="start-bar"><span class="start-bar-label">はじめる</span><span class="start-bar-caret">▼</span></div>
</div>

<div id="textWindow">
  <img id="faceIcon" alt="">
  <div class="text-body">
    <div id="nameDisplay"></div>
    <div id="textContent"></div>
  </div>
  <div id="continueIcon">▼</div>
</div>

<div class="hud" id="hud-bl"><div id="bottomNav" onclick="goBack()"><span class="back-label">← 戻る</span></div></div>

<div id="endScreen">
  <div class="end-panel">
    <div class="end-btn" id="replayBtn"><span class="end-label">もう一度見る</span><span class="end-en">REPLAY</span></div>
    <div class="end-btn" id="backBtn"><span class="end-label">戻る</span><span class="end-en">← BACK</span></div>
  </div>
</div>

<script>
const dialogues = [
  { speaker:'shi',    text:'Sが1本で、5万ね',       bg:'images/mdgc_nomi.jpg' },
  { speaker:'shi',    text:'はい',                   bg:'images/mdgc_kane.jpg', fade:false },
  { speaker:'desu',   text:'どうも' },
  { speaker:'desu',   text:'あ、ホーレムもらえますか', bg:'images/mdgc_nomi.jpg', fade:false },
  { speaker:'shi',    text:'…ホーレム？\nああ、ガラね' },
  { speaker:'shi',    text:'はい',                   bg:'images/mdgc_holem.jpg', fade:false },
  { speaker:'desu',   text:'どうも' },
  { speaker:'sakana', text:'おつかれさん',            bg:'images/kkj.jpg' },
  { speaker:'desu',   text:'うん　キミも' },
  { speaker:'sakana', text:'俺はなにもしてない' },
  { speaker:'desu',   text:'まあね' },
  { speaker:'sakana', text:'…' },
  { speaker:'desu',   text:'なに？' },
  { speaker:'sakana', text:'いや別に\nところで、それもらってどうするの' },
  { speaker:'desu',   text:'ホーレム？\nどうもしない' },
  { speaker:'sakana', text:'…ん？\nじゃあなんでもらうの' },
  { speaker:'desu',   text:'…かわいいから' },
  { speaker:'sakana', text:'かわいい…か？' },
  { speaker:'desu',   text:'うん' },
  { speaker:'sakana', text:'…そうか' }
];

const speakerNames = { sakana:'サカナ', desu:'デス', shi:'？' };
const faceIconPaths = { sakana:'images/sakana.jpg', desu:'images/desu.jpg', shi:'images/shi_icon.jpg' };
const freqs = { sakana:300, desu:700, shi:200 };

let idx = -1, isTyping = false, typingTimer = null, canProceed = false;
let started = false, prevSpeaker = null, currentBg = null, changingBg = false;
let isMuted = JSON.parse(localStorage.getItem('desu-muted')||'false');
let audioCtx = null;

function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function playBeep(spk) {
  if(isMuted) return;
  try {
    initAudio();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freqs[spk]||600; g.gain.value=0.07;
    o.start(); o.stop(audioCtx.currentTime+0.03);
  } catch(e){}
}
function toggleMute() {
  isMuted=!isMuted; localStorage.setItem('desu-muted',isMuted);
  document.getElementById('muteIcon').style.display=isMuted?'none':'';
  document.getElementById('unmuteIcon').style.display=isMuted?'':'none';
}
document.getElementById('muteBtn').onclick=e=>{e.stopPropagation();toggleMute();};
if(isMuted){document.getElementById('muteIcon').style.display='none';document.getElementById('unmuteIcon').style.display='';}

function goBack() { window.location.href='../index.html'; }
document.getElementById('backBtn').onclick=e=>{e.stopPropagation();goBack();};
document.getElementById('logoLink').onclick=e=>{e.preventDefault();goBack();};

function startStory() {
  started=true; initAudio();
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('bg').style.backgroundImage="url('images/kkj.jpg')";
  currentBg='images/kkj.jpg';
  setTimeout(()=>{
    document.getElementById('fadeOverlay').classList.add('out');
    document.getElementById('bottomNav').classList.add('show');
    setTimeout(()=>showDialogue(0), 1800);
  },600);
}

function showDialogue(i) {
  if(i>=dialogues.length){endStory();return;}
  const d=dialogues[i]; idx=i; canProceed=false;
  document.getElementById('continueIcon').classList.remove('show');
  if(d.bg && d.bg!==currentBg) {
    const useFade=d.fade!==false;
    if(useFade) changeBg(d.bg,()=>displayLine(d));
    else { document.getElementById('bg').style.backgroundImage=`url('${d.bg}')`; currentBg=d.bg; displayLine(d); }
  } else {
    const delay=(prevSpeaker&&prevSpeaker!==d.speaker)?400:0;
    setTimeout(()=>displayLine(d),delay);
  }
}

function changeBg(newBg,cb) {
  changingBg=true;
  const fo=document.getElementById('fadeOverlay');
  document.getElementById('textWindow').classList.remove('active');
  fo.classList.remove('out'); fo.classList.add('in');
  setTimeout(()=>{
    document.getElementById('bg').style.backgroundImage=`url('${newBg}')`;
    currentBg=newBg;
    fo.classList.remove('in'); fo.classList.add('out');
    setTimeout(()=>{ changingBg=false; if(cb)cb(); },1500);
  },1000);
}

function displayLine(d) {
  document.getElementById('textWindow').classList.add('active');
  document.getElementById('faceIcon').src=faceIconPaths[d.speaker];
  const nd=document.getElementById('nameDisplay');
  nd.textContent=speakerNames[d.speaker]; nd.className='';
  nd.classList.add(d.speaker);
  document.getElementById('textContent').textContent='';
  prevSpeaker=d.speaker;
  typeText(d.text,d.speaker);
}

function typeText(text,spk) {
  isTyping=true; let ci=0;
  const el=document.getElementById('textContent');
  function step() {
    if(ci<text.length) {
      const ch=text[ci];
      if(ch==='\n'){el.innerHTML+='<br>';ci++;typingTimer=setTimeout(step,350);}
      else{
        const t=document.createElement('span'); t.textContent=ch;
        el.appendChild(t); playBeep(spk); ci++;
        typingTimer=setTimeout(step,50);
      }
    } else {
      isTyping=false;
      setTimeout(()=>{canProceed=true;document.getElementById('continueIcon').classList.add('show');},(text==='…')?800:300);
    }
  }
  step();
}

function skipType() {
  if(typingTimer){clearTimeout(typingTimer);typingTimer=null;}
  isTyping=false;
  document.getElementById('textContent').innerHTML=dialogues[idx].text.replace(/\n/g,'<br>');
  canProceed=true; document.getElementById('continueIcon').classList.add('show');
}

function endStory() {
  const fo=document.getElementById('fadeOverlay');
  fo.classList.remove('out'); fo.classList.add('in');
  document.getElementById('textWindow').classList.remove('active');
  document.getElementById('bottomNav').classList.remove('show');
  setTimeout(()=>{
    document.getElementById('endScreen').classList.add('show');
    fo.classList.remove('in'); fo.classList.add('out');
  },1800);
}

document.getElementById('replayBtn').onclick=e=>{
  e.stopPropagation();
  document.getElementById('endScreen').classList.remove('show');
  const fo=document.getElementById('fadeOverlay');
  fo.classList.remove('out'); fo.classList.add('in');
  setTimeout(()=>{
    idx=-1; started=false; prevSpeaker=null; currentBg=null; changingBg=false;
    document.getElementById('textContent').innerHTML='';
    document.getElementById('bg').style.backgroundImage='';
    document.getElementById('titleScreen').classList.remove('hidden');
    fo.classList.remove('in'); fo.classList.add('out');
  },1000);
};

document.querySelector('.start-bar').onclick=e=>{e.stopPropagation(); document.body.click();};
document.body.addEventListener('click',()=>{
  if(!started){startStory();}
  else if(changingBg) return;
  else if(isTyping) skipType();
  else if(canProceed){idx++;showDialogue(idx);}
});

setTimeout(()=>document.getElementById('fadeOverlay').classList.add('out'),100);
</script>
</body>
</html>
